<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e9ece4">
<title>Höhenlinien & Karten</title>
<style>
:root{--paper:#e9ece4;--paper-2:#f3f5ef;--ink:#26302e;--ink-soft:#5d6764;--line:#c4ccc1;--amber:#c2762d;--right:#3f8f5b;--wrong:#bd5239;--shadow:0 2px 12px rgba(38,48,46,.10);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,system-ui,"Segoe UI",sans-serif;line-height:1.4;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);-webkit-text-size-adjust:100%;}
.wrap{max-width:560px;margin:0 auto;padding:13px 13px 36px;}
.eyebrow{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--amber);font-weight:700;margin:0 0 1px;}
h1{font-family:Georgia,serif;font-weight:600;font-size:25px;line-height:1.05;margin:0;}
.lede{color:var(--ink-soft);font-size:12px;margin:2px 0 0;}
.mode-bar{display:flex;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:3px;margin:11px 0 7px;gap:3px;}
.mbtn{flex:1;border:0;background:transparent;color:var(--ink-soft);font-size:11px;font-weight:600;padding:8px 4px;border-radius:8px;cursor:pointer;font-family:inherit;transition:.12s;text-align:center;line-height:1.2;}
.mbtn[aria-pressed="true"]{background:var(--ink);color:var(--paper-2);}
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:8px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin:0 0 6px;}
.card-desc{font-size:13px;color:var(--ink-soft);margin:0 0 10px;line-height:1.5;}
.info-box{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:8px;}
.info-box h3{font-size:13px;margin:0 0 5px;}
.info-box p{font-size:12px;color:var(--ink-soft);margin:3px 0;line-height:1.5;}
.quiz-card{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:8px;box-shadow:var(--shadow);}
.quiz-q{font-size:14px;font-weight:600;margin:0 0 10px;line-height:1.4;}
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.quiz-opt{border:2px solid var(--line);background:var(--paper);border-radius:12px;padding:6px;cursor:pointer;transition:.12s;position:relative;}
.quiz-opt canvas{width:100%;height:auto;display:block;border-radius:8px;}
.quiz-opt.correct{border-color:var(--right);background:rgba(63,143,91,.08);}
.quiz-opt.incorrect{border-color:var(--wrong);background:rgba(189,82,57,.08);}
.quiz-opt .badge{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;font-size:13px;line-height:24px;text-align:center;color:#fff;display:none;}
.quiz-opt.correct .badge{display:block;background:var(--right);}
.quiz-opt.incorrect .badge{display:block;background:var(--wrong);}
.result-hint{font-size:13px;color:var(--ink-soft);margin:10px 0 0;text-align:center;}
.btn{width:100%;margin-top:10px;border:0;background:var(--ink);color:var(--paper-2);font-size:14px;font-weight:700;font-family:inherit;padding:12px;border-radius:12px;cursor:pointer;}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-row .btn{flex:1;}
.scorebar{display:flex;gap:7px;margin-top:9px;}
.stat{flex:1;background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:7px 10px;text-align:center;}
.stat b{display:block;font-family:Georgia,serif;font-size:18px;line-height:1;}
.stat small{font-size:10px;color:var(--ink-soft);}
.done-box{text-align:center;padding:12px 0;}
.done-e{font-size:30px;margin:0 0 4px;}
.done-s{font-family:Georgia,serif;font-size:20px;font-weight:600;margin:3px 0;}
.done-sub{color:var(--ink-soft);font-size:13px;margin:2px 0 12px;}
canvas{display:block;width:100%;height:auto;border-radius:10px;}
.fopt{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:14px;font-weight:600;font-family:inherit;padding:12px 13px;border-radius:11px;cursor:pointer;text-align:left;transition:.1s;width:100%;margin-bottom:7px;}
.fopt.correct{background:var(--right);border-color:var(--right);color:#fff;}
.fopt.incorrect{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.fopt:disabled{cursor:default;}
.draw-grid{position:relative;background:#f9f7f1;border:1px solid var(--line);border-radius:10px;overflow:hidden;touch-action:none;}
.draw-grid canvas{display:block;width:100%;height:auto;}
.draw-dots{position:absolute;inset:0;pointer-events:none;}
.draw-dot{position:absolute;width:28px;height:28px;margin:-14px 0 0 -14px;border-radius:50%;border:3px solid var(--amber);background:rgba(255,255,255,.9);pointer-events:auto;cursor:pointer;transition:transform .12s,background .15s;}
.draw-dot.placed{background:var(--amber);border-color:var(--amber);}
.draw-dot.active{transform:scale(1.3);border-color:var(--ink);}
.draw-dot.correct{background:var(--right);border-color:var(--right);}
.draw-dot.wrong{background:var(--wrong);border-color:var(--wrong);}
.draw-marker{position:absolute;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:var(--amber);pointer-events:none;}
.draw-label{position:absolute;font-size:10px;font-weight:700;color:var(--amber);pointer-events:none;}
.draw-hint{font-size:12px;color:var(--ink-soft);text-align:center;margin:8px 0 0;line-height:1.4;}
.draw-hint b{color:var(--ink);}
.steep-btn{border:2px solid var(--line);background:var(--paper);color:var(--ink);font-size:13px;font-weight:600;font-family:inherit;padding:10px 14px;border-radius:10px;cursor:pointer;transition:.12s;text-align:center;flex:1;}
.steep-btn.correct{border-color:var(--right);background:rgba(63,143,91,.1);color:var(--right);}
.steep-btn.incorrect{border-color:var(--wrong);background:rgba(189,82,57,.1);color:var(--wrong);}
.steep-btn:disabled{cursor:default;}
.seg-row{display:flex;gap:6px;margin-top:8px;}
.toggle-row{display:flex;align-items:center;justify-content:flex-end;gap:7px;margin:0 0 2px;}
.toggle-row label{font-size:11px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
.toggle-sw{position:relative;width:36px;height:20px;background:var(--line);border-radius:10px;cursor:pointer;border:0;padding:0;transition:.2s;}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;}
.toggle-sw.on{background:var(--amber);}
.toggle-sw.on::after{left:18px;}
@media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <p class="eyebrow">Atlas · Übung</p>
  <h1>Höhenlinien & Karten</h1>
  <p class="lede">Lerne, Höhenlinien und Profile zu lesen.</p>
</header>
<div class="mode-bar" role="group">
  <button class="mbtn" id="m0" aria-pressed="true">Lernen</button>
  <button class="mbtn" id="m1" aria-pressed="false">Zeichnen</button>
  <button class="mbtn" id="m2" aria-pressed="false">Wege</button>
  <button class="mbtn" id="m3" aria-pressed="false">Quiz</button>
  <button class="mbtn" id="m4" aria-pressed="false">Maßstab</button>
</div>
<div class="toggle-row">
  <label for="advToggle">Advanced</label>
  <button class="toggle-sw" id="advToggle" role="switch" aria-checked="false"></button>
</div>
<div id="content"></div>
</div>
<script>
/* ━━━━━━ TERRAIN: organic shapes with subtle noise ━━━━━━ */
// Simple value noise for organic contours
function _hash(ix,iy){let n=ix*374761393+iy*668265263;n=(n^(n>>13))*1274126177;return(n^(n>>16))/2147483648;}
function _noise(x,y){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);
  const a=_hash(ix,iy),b=_hash(ix+1,iy),c=_hash(ix,iy+1),d=_hash(ix+1,iy+1);
  return a+(b-a)*sx+(c-a)*sy+(a-b-c+d)*sx*sy;
}
function fbm(x,y,oct){let v=0,amp=1,freq=1,tot=0;for(let i=0;i<oct;i++){v+=_noise(x*freq,y*freq)*amp;tot+=amp;amp*=.5;freq*=2;}return v/tot;}

function terrain_peak(x,y){
  const dx=x-.52,dy=y-.48;
  const d=Math.sqrt(dx*dx+dy*dy);
  const base=1-d*2.1;
  const n=fbm(x*4.5+2.3,y*4.5+1.7,3)*.18;
  // small shoulder bump
  const sx=x-.72,sy=y-.35,sd=Math.sqrt(sx*sx+sy*sy);
  const shoulder=Math.max(0,.3-sd*1.8);
  return Math.max(0,Math.min(1,base+n+shoulder));
}
function terrain_ridge(x,y){
  const wobble=Math.sin(x*Math.PI*2.5)*.08+fbm(x*3,y*3,2)*.1;
  const dist=Math.abs(y-.5+wobble);
  return Math.max(0,1-dist*2.3);
}
function terrain_valley(x,y){
  const bend=Math.sin(x*Math.PI*2)*.1+fbm(x*4,y*4,2)*.07;
  const dist=Math.abs(y-.5+bend);
  return Math.min(1,dist*2.2+fbm(x*5,y*5,2)*.08);
}
function terrain_slope(x,y){
  const base=x*.85+.08;
  const n=fbm(x*4+7,y*4+3,3)*.12;
  const step=y>.4&&y<.6?0.06:0;
  return Math.max(0,Math.min(1,base+n+step));
}
function terrain_plateau(x,y){
  const dx=x-.5,dy=y-.48;
  const d=Math.sqrt(dx*dx+dy*dy*1.3);
  const n=fbm(x*3.5+5,y*3.5,3)*.1;
  const flat=d<.22?1:Math.max(0,1-(d-.22)*3.2);
  return Math.max(0,Math.min(1,flat+n));
}
function terrain_saddle(x,y){
  const dx=(x-.5)*2,dy=(y-.5)*2;
  const base=.5+dx*dx*.35-dy*dy*.4;
  const n=fbm(x*4+1,y*4+2,2)*.09;
  return Math.max(0,Math.min(1,base+n));
}
function terrain_spur(x,y){
  // A ridge that descends from top-left to bottom-right (asymmetric)
  const along=x*.6+y*.4;
  const across=Math.abs((y-.5)-(x-.5)*.5);
  const base=1-along*.9-across*1.4;
  const n=fbm(x*4+9,y*4+3,3)*.12;
  return Math.max(0,Math.min(1,base+n));
}
function terrain_cwm(x,y){
  // Bowl/cirque — open on one side (right), enclosed on three sides
  const dx=x-.4,dy=y-.5;
  const d=Math.sqrt(dx*dx+dy*dy);
  const angle=Math.atan2(dy,dx);
  const openFactor=(angle>-0.6&&angle<0.6)?1.8:1;
  const base=1-d*openFactor*1.6;
  const n=fbm(x*4+6,y*4+8,3)*.1;
  return Math.max(0,Math.min(1,base+n));
}
function terrain_ascent(x,y){
  // Asymmetric ascent — steep on one side, gentle on the other
  const shifted=y-.5;
  const base=shifted>0?shifted*1.2:(1+shifted*3)*.4;
  const tilt=x*.25;
  const n=fbm(x*5+4,y*5+1,3)*.1;
  return Math.max(0,Math.min(1,base+tilt+n));
}
function terrain_hills(x,y){
  // Two offset hills — not symmetrical
  const d1x=x-.3,d1y=y-.35,d1=Math.sqrt(d1x*d1x+d1y*d1y);
  const d2x=x-.68,d2y=y-.62,d2=Math.sqrt(d2x*d2x+d2y*d2y);
  const h1=Math.max(0,1-d1*3);
  const h2=Math.max(0,.8-d2*2.8);
  const n=fbm(x*4+3,y*4+5,3)*.1;
  return Math.max(0,Math.min(1,Math.max(h1,h2)+n));
}

// Advanced terrains — more complex, busier, realistic
function terrain_adv_mountain(x,y){
  // Multi-peak mountain with subsidiary ridges
  const dx=x-.45,dy=y-.5;
  const d=Math.sqrt(dx*dx+dy*dy);
  const main=Math.max(0,1-d*2);
  const r1x=x-.7,r1y=y-.3,r1=Math.max(0,.55-Math.sqrt(r1x*r1x+r1y*r1y)*2.5);
  const r2x=x-.25,r2y=y-.75,r2=Math.max(0,.45-Math.sqrt(r2x*r2x+r2y*r2y)*2.2);
  const ridge=Math.max(0,.3-Math.abs(y-.5+Math.sin(x*5)*.08)*1.5)*(x>.3?1:0);
  const n=fbm(x*6+1.5,y*6+2.5,4)*.15;
  return Math.max(0,Math.min(1,Math.max(main,r1,r2)+ridge*.3+n));
}
function terrain_adv_valley(x,y){
  // Deep valley with side ravines
  const mainBend=Math.sin(x*Math.PI*1.8)*.15+Math.sin(x*Math.PI*4)*.05;
  const dist=Math.abs(y-.5+mainBend);
  const base=Math.min(1,dist*2.5);
  const ravine1=Math.max(0,.15-Math.abs(x-.35)*1.5)*Math.max(0,1-Math.abs(y-.5+mainBend-.1)*8);
  const ravine2=Math.max(0,.12-Math.abs(x-.65)*1.2)*Math.max(0,1-Math.abs(y-.5+mainBend+.08)*7);
  const n=fbm(x*7+2,y*7+4,4)*.1;
  return Math.max(0,Math.min(1,base-ravine1-ravine2+n));
}
function terrain_adv_plateau(x,y){
  // Plateau with eroded edges and a small crater
  const dx=x-.5,dy=y-.48;
  const d=Math.sqrt(dx*dx+dy*dy*1.2);
  const flat=d<.2?1:d<.28?1-(d-.2)/.08*.15:Math.max(0,1-(d-.2)*2.8);
  const crater_dx=x-.55,crater_dy=y-.42,cd=Math.sqrt(crater_dx*crater_dx+crater_dy*crater_dy);
  const crater=cd<.08?-(1-cd/.08)*.2:0;
  const erosion=fbm(x*8+3,y*8+7,4)*.18;
  const gullies=Math.max(0,Math.sin(Math.atan2(dy,dx)*5)*.08)*(d>.2?1:0);
  return Math.max(0,Math.min(1,flat+crater+erosion-gullies));
}
function terrain_adv_ridge(x,y){
  // Complex ridge system with spurs branching off
  const mainRidge=Math.max(0,.7-Math.abs(y-.5+Math.sin(x*Math.PI*3)*.12)*2);
  const spur1=Math.max(0,.4-Math.abs(x-.3+Math.sin(y*8)*.03)*2)*(y>.5?1:0)*Math.max(0,1-(y-.5)*3);
  const spur2=Math.max(0,.35-Math.abs(x-.7-Math.sin(y*6)*.04)*2)*(y<.5?1:0)*Math.max(0,1-(.5-y)*3);
  const n=fbm(x*6+5,y*6+1,4)*.12;
  return Math.max(0,Math.min(1,Math.max(mainRidge,spur1,spur2)+n));
}
function terrain_adv_coast(x,y){
  // Coastal cliff — steep drop on one side, rolling hills on the other
  const cliff=x<.35?x/.35:1;
  const coastNoise=fbm(x*3+2,y*5+1,3)*.12;
  const hills_d1=Math.sqrt((x-.6)*(x-.6)+(y-.3)*(y-.3));
  const hills_d2=Math.sqrt((x-.75)*(x-.75)+(y-.7)*(y-.7));
  const h1=Math.max(0,.4-hills_d1*1.5);
  const h2=Math.max(0,.3-hills_d2*1.3);
  const n=fbm(x*7+9,y*7+3,4)*.1;
  return Math.max(0,Math.min(1,cliff*.6+Math.max(h1,h2)+coastNoise+n));
}
function terrain_adv_cirque(x,y){
  // Large cirque with multiple levels (stepped terrain)
  const dx=x-.45,dy=y-.5;
  const d=Math.sqrt(dx*dx+dy*dy);
  const angle=Math.atan2(dy,dx);
  const open=(angle>-.8&&angle<.8)?2.2:1;
  const raw=1-d*open*1.4;
  const stepped=Math.floor(raw*5)/5+fbm(x*5+4,y*5+2,3)*.08;
  const n=fbm(x*8+1,y*8+6,4)*.08;
  return Math.max(0,Math.min(1,stepped+n));
}

const SHAPES={
  peak:{fn:terrain_peak,name:'Berg',desc:'Ein Berg mit einer kleinen Schulter. Die Höhenlinien bilden unregelmäßige Ringe.'},
  ridge:{fn:terrain_ridge,name:'Bergrücken',desc:'Ein geschwungener Kamm. Die Linien folgen dem Rücken — nicht ganz gerade.'},
  valley:{fn:terrain_valley,name:'Tal',desc:'Ein leicht gewundenes Tal. Die Linien biegen sich Richtung Talgrund.'},
  slope:{fn:terrain_slope,name:'Hang',desc:'Ein Hang — links tief, rechts hoch. Die Abstände sind nicht überall gleich.'},
  plateau:{fn:terrain_plateau,name:'Hochebene',desc:'Oben flach (Linien weit auseinander), an den Rändern steil (Linien eng).'},
  saddle:{fn:terrain_saddle,name:'Sattel',desc:'Zwei Erhebungen mit einer Senke dazwischen — wie ein Pferdesattel.'},
  spur:{fn:terrain_spur,name:'Geländenase',desc:'Ein Vorsprung, der vom Berg abfällt. Die Linien zeigen wie ein V talwärts.'},
  cwm:{fn:terrain_cwm,name:'Kar / Mulde',desc:'Ein dreiseitig umschlossener Kessel — zu einer Seite offen. Die Linien bilden ein U.'},
  ascent:{fn:terrain_ascent,name:'Steilstufe',desc:'Auf einer Seite steil (Linien eng), auf der anderen flach (Linien weit).'},
  hills:{fn:terrain_hills,name:'Hügelgruppe',desc:'Zwei Hügel nebeneinander — jeder hat eigene geschlossene Höhenlinien.'},
  adv_mountain:{fn:terrain_adv_mountain,name:'Bergmassiv',desc:'Mehrere Gipfel mit Verbindungsgraten — ein komplexes Gebirge.'},
  adv_valley:{fn:terrain_adv_valley,name:'Tiefes Tal',desc:'Ein gewundenes Tal mit Seitenschluchten — viele enge Linien an den Hängen.'},
  adv_plateau:{fn:terrain_adv_plateau,name:'Erosionsplateau',desc:'Eine Hochebene mit erodierten Rändern und einer kleinen Senke oben.'},
  adv_ridge:{fn:terrain_adv_ridge,name:'Gratsystem',desc:'Ein Hauptgrat mit abzweigenden Nebenkämmen — typisch für Mittelgebirge.'},
  adv_coast:{fn:terrain_adv_coast,name:'Steilküste',desc:'Steile Klippen auf einer Seite, sanfte Hügel dahinter.'},
  adv_cirque:{fn:terrain_adv_cirque,name:'Stufenkar',desc:'Ein Kar mit Geländestufen — die Linien bilden verschachtelte U-Formen.'},
};
const SHAPE_KEYS=Object.keys(SHAPES);

function getHeight(shape,x,y,minAlt,maxAlt){
  const v=Math.max(0,Math.min(1,SHAPES[shape].fn(x,y)));
  return minAlt+v*(maxAlt-minAlt);
}

/* ━━━━━━ PATH GENERATION (smooth cubic spline A→B) ━━━━━━ */
function genStraightPath(y,nPoints){
  // Perfectly horizontal line — profile is a true cross-section
  const pts=[];
  for(let i=0;i<nPoints;i++){
    const x=0.05+i/(nPoints-1)*0.9;
    pts.push({x,y});
  }
  return pts;
}
function genPath(seed,nPoints){
  let s=seed;const rng=()=>{s=(s*16807)%2147483647;return s/2147483647;};
  const ctrl=[{x:0.05,y:0.25+rng()*0.5}];
  const endY=0.25+rng()*0.5;
  for(let i=1;i<nPoints-1;i++){
    const t=i/(nPoints-1);
    const baseY=ctrl[0].y*(1-t)+endY*t;
    const wobble=(rng()-.5)*.4;
    ctrl.push({x:t*.9+.05,y:Math.max(.08,Math.min(.92,baseY+wobble))});
  }
  ctrl.push({x:0.95,y:endY});
  // Catmull-Rom interpolation for smooth curve
  const pts=[];const segments=40;
  for(let i=0;i<ctrl.length-1;i++){
    const p0=ctrl[Math.max(0,i-1)],p1=ctrl[i],p2=ctrl[i+1],p3=ctrl[Math.min(ctrl.length-1,i+2)];
    const steps=(i===ctrl.length-2)?segments+1:segments;
    for(let j=0;j<steps;j++){
      const t=j/segments;const t2=t*t,t3=t2*t;
      const x=0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
      const y=0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3);
      pts.push({x:Math.max(.02,Math.min(.98,x)),y:Math.max(.02,Math.min(.98,y))});
    }
  }
  pts[0]=ctrl[0];
  pts[pts.length-1]=ctrl[ctrl.length-1];
  return pts;
}

/* ━━━━━━ DRAWING: CONTOUR MAP with labels + path ━━━━━━ */
function drawContourMap(canvas,shape,minAlt,maxAlt,interval,path,opts){
  const o=opts||{};
  const W=300,H=300;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#f9f7f1';ctx.fillRect(0,0,W,H);

  const levels=[];
  for(let alt=minAlt+interval;alt<maxAlt;alt+=interval)levels.push(alt);

  // Draw contours via marching squares on a small grid
  const gw=80,gh=80;
  const grid=new Float32Array(gw*gh);
  for(let gy=0;gy<gh;gy++)for(let gx=0;gx<gw;gx++){
    grid[gy*gw+gx]=getHeight(shape,gx/(gw-1),gy/(gh-1),minAlt,maxAlt);
  }
  const sx=W/gw,sy=H/gh;

  levels.forEach(alt=>{
    const isMajor=(alt%100===0);
    ctx.strokeStyle=isMajor?'#6b4e20':'#9a7a48';
    ctx.lineWidth=isMajor?2.5:1.5;
    ctx.beginPath();
    for(let gy=0;gy<gh-1;gy++)for(let gx=0;gx<gw-1;gx++){
      const tl=grid[gy*gw+gx]>=alt?1:0,tr=grid[gy*gw+gx+1]>=alt?1:0;
      const br=grid[(gy+1)*gw+gx+1]>=alt?1:0,bl=grid[(gy+1)*gw+gx]>=alt?1:0;
      const cell=tl*8+tr*4+br*2+bl;if(cell===0||cell===15)continue;
      const lerp=(a,b)=>(alt-a)/(b-a);
      const v00=grid[gy*gw+gx],v10=grid[gy*gw+gx+1],v11=grid[(gy+1)*gw+gx+1],v01=grid[(gy+1)*gw+gx];
      const t=lerp(v00,v10),r=lerp(v10,v11),b2=lerp(v01,v11),l=lerp(v00,v01);
      const segs=[];
      if(cell===1||cell===14)segs.push([gx,gy+l,gx+b2,gy+1]);
      else if(cell===2||cell===13)segs.push([gx+b2,gy+1,gx+1,gy+r]);
      else if(cell===3||cell===12)segs.push([gx,gy+l,gx+1,gy+r]);
      else if(cell===4||cell===11)segs.push([gx+t,gy,gx+1,gy+r]);
      else if(cell===5){segs.push([gx+t,gy,gx+1,gy+r]);segs.push([gx,gy+l,gx+b2,gy+1]);}
      else if(cell===6||cell===9)segs.push([gx+t,gy,gx+b2,gy+1]);
      else if(cell===7||cell===8)segs.push([gx,gy+l,gx+t,gy]);
      else if(cell===10){segs.push([gx,gy+l,gx+t,gy]);segs.push([gx+b2,gy+1,gx+1,gy+r]);}
      segs.forEach(s=>{ctx.moveTo(s[0]*sx,s[1]*sy);ctx.lineTo(s[2]*sx,s[3]*sy);});
    }
    ctx.stroke();

    // Label this contour line
    ctx.font='bold 12px -apple-system,sans-serif';
    ctx.fillStyle='#5a3e15';ctx.textAlign='center';
    // Find a point on this contour to place label
    let placed=false;
    for(let gx=Math.floor(gw*.3);gx<Math.floor(gw*.75)&&!placed;gx+=3){
      for(let gy=Math.floor(gh*.2);gy<Math.floor(gh*.8)&&!placed;gy+=3){
        const v=grid[gy*gw+gx];
        if(Math.abs(v-alt)<interval*.15){
          // Clear background for readability
          const tx=gx*sx,ty=gy*sy;
          const m=ctx.measureText(alt+'m');
          ctx.fillStyle='rgba(249,247,241,.85)';
          ctx.fillRect(tx-m.width/2-2,ty-8,m.width+4,13);
          ctx.fillStyle='#5a3e15';
          ctx.fillText(alt+'m',tx,ty+3);
          placed=true;
        }
      }
    }
  });

  // Draw path
  if(path&&path.length>1){
    ctx.setLineDash([6,4]);
    ctx.strokeStyle='#c2762d';ctx.lineWidth=2.5;
    ctx.beginPath();
    path.forEach((p,i)=>{
      const px=p.x*W,py=p.y*H;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.stroke();ctx.setLineDash([]);
    // A and B labels
    ctx.font='bold 14px Georgia,serif';ctx.fillStyle='#c2762d';
    ctx.textAlign='center';
    ctx.fillText('A',path[0].x*W,path[0].y*H-10);
    ctx.fillText('B',path[path.length-1].x*W,path[path.length-1].y*H-10);
    // Dots at A and B
    ctx.fillStyle='#c2762d';
    ctx.beginPath();ctx.arc(path[0].x*W,path[0].y*H,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(path[path.length-1].x*W,path[path.length-1].y*H,4,0,Math.PI*2);ctx.fill();
  }
}

/* ━━━━━━ DRAWING: PROFILE along path ━━━━━━ */
function drawProfile(canvas,shape,minAlt,maxAlt,interval,path,opts){
  const o=opts||{};
  const W=300,H=160;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#f9f7f1';ctx.fillRect(0,0,W,H);

  const pad={l:40,r:12,t:14,b:24};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;

  // Grid lines + altitude labels
  const levels=[];
  for(let alt=minAlt;alt<=maxAlt;alt+=interval)levels.push(alt);
  ctx.font='10px -apple-system,sans-serif';ctx.textAlign='right';
  levels.forEach(alt=>{
    const y=pad.t+ph*(1-(alt-minAlt)/(maxAlt-minAlt));
    ctx.strokeStyle=(alt%200===0)?'#ccc':'#e5e5e5';
    ctx.lineWidth=(alt%200===0)?1:0.6;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();
    ctx.fillStyle='#888';ctx.fillText(alt+'m',pad.l-4,y+3);
  });

  // Axes
  ctx.strokeStyle='#999';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+ph);ctx.lineTo(pad.l+pw,pad.t+ph);ctx.stroke();

  // Sample heights along path
  const nSamples=60;
  const heights=[];
  for(let i=0;i<nSamples;i++){
    const t=i/(nSamples-1);
    // Interpolate along path
    const pathLen=path.length-1;
    const fi=t*pathLen;
    const idx=Math.min(pathLen-1,Math.floor(fi));
    const frac=fi-idx;
    const px=path[idx].x*(1-frac)+path[idx+1].x*frac;
    const py=path[idx].y*(1-frac)+path[idx+1].y*frac;
    heights.push(getHeight(shape,px,py,minAlt,maxAlt));
  }

  // Draw profile fill
  ctx.beginPath();
  heights.forEach((h,i)=>{
    const x=pad.l+i/(nSamples-1)*pw;
    const y=pad.t+ph*(1-(h-minAlt)/(maxAlt-minAlt));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+pw,pad.t+ph);ctx.lineTo(pad.l,pad.t+ph);ctx.closePath();
  ctx.fillStyle='rgba(194,118,45,.12)';ctx.fill();

  // Draw profile line
  ctx.beginPath();ctx.strokeStyle='#5a3e15';ctx.lineWidth=2.5;
  heights.forEach((h,i)=>{
    const x=pad.l+i/(nSamples-1)*pw;
    const y=pad.t+ph*(1-(h-minAlt)/(maxAlt-minAlt));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // A / B labels
  ctx.font='bold 12px Georgia,serif';ctx.fillStyle='#c2762d';ctx.textAlign='center';
  ctx.fillText('A',pad.l,H-6);ctx.fillText('B',pad.l+pw,H-6);
}

/* ━━━━━━ DRAW PROFILE MODE ━━━━━━ */
// Find every contour-line crossing along the path
function findAllContourCrossings(shape,path,minAlt,maxAlt,interval){
  const crossings=[];
  const nSamples=200;
  let prevH=null;
  for(let i=0;i<=nSamples;i++){
    const t=i/nSamples;
    const fi=t*(path.length-1);const idx=Math.min(path.length-2,Math.floor(fi));const frac=fi-idx;
    const px=path[idx].x*(1-frac)+path[idx+1].x*frac;
    const py=path[idx].y*(1-frac)+path[idx+1].y*frac;
    const h=getHeight(shape,px,py,minAlt,maxAlt);
    if(prevH!==null){
      // Check if a contour level was crossed between prevH and h
      const lo=Math.min(prevH,h),hi=Math.max(prevH,h);
      const startLevel=Math.ceil(lo/interval)*interval;
      for(let lvl=startLevel;lvl<=hi;lvl+=interval){
        if(lvl<minAlt||lvl>maxAlt)continue;
        if(lvl===lo&&lvl===hi)continue;
        // Interpolate to find approximate t of crossing
        const frac2=(lvl-prevH)/(h-prevH);
        const ct=(i-1+frac2)/nSamples;
        const cfi=ct*(path.length-1);const cidx=Math.min(path.length-2,Math.floor(cfi));const cfrac=cfi-cidx;
        const cx=path[cidx].x*(1-cfrac)+path[cidx+1].x*cfrac;
        const cy=path[cidx].y*(1-cfrac)+path[cidx+1].y*cfrac;
        crossings.push({x:cx,y:cy,t:ct,alt:lvl});
      }
    }
    prevH=h;
  }
  // Remove duplicates (same altitude within very short distance)
  const filtered=[];
  for(const c of crossings){
    const dup=filtered.find(f=>f.alt===c.alt&&Math.abs(f.t-c.t)<0.02);
    if(!dup)filtered.push(c);
  }
  return filtered;
}

function renderDraw(){
  // Prefer terrains with clear steep/flat contrast
  const goodForDraw=['peak','ridge','ascent','hills','slope','spur','adv_mountain','adv_valley','adv_ridge'];
  const shapes=advanced?goodForDraw:goodForDraw.filter(s=>!s.startsWith('adv_'));
  const shape=shapes[Math.floor(rng()*shapes.length)];
  const minAlt=advanced?300:200,maxAlt=advanced?1100:600;
  const interval=advanced?50:100;
  const useStraight=rng()<0.3;
  const path=useStraight?genStraightPath(.4+rng()*.2,60):genPath(Math.floor(rng()*99999),7);

  // Find every contour crossing along the path (cap at 12 for usability)
  let samples=findAllContourCrossings(shape,path,minAlt,maxAlt,interval);
  if(samples.length>12){
    // Keep every nth to stay under limit while preserving start/end
    const step=Math.ceil(samples.length/12);
    samples=samples.filter((_,i)=>i%step===0);
  }
  const N=samples.length;
  if(N<3){rngSeed=Date.now()%100000;renderDraw();return;}

  let html='<div class="card"><div class="card-title">Profil zeichnen</div>';
  html+='<div class="card-desc">Jeder Punkt liegt dort, wo der Weg eine Höhenlinie kreuzt. Tippe im Profil die <b>richtige Höhe</b> für jeden Punkt!</div>';
  html+='<canvas id="dMap"></canvas></div>';
  html+='<div class="card" style="margin-top:8px;padding-bottom:4px;"><div class="card-title">Dein Profil</div>';
  html+='<div class="draw-grid" id="drawGrid"><canvas id="dProf"></canvas></div>';
  html+='<div style="display:flex;align-items:center;gap:8px;margin-top:6px;"><div class="draw-hint" id="drawHint" style="flex:1;margin:0;">Tippe die richtige Höhe für <b>Punkt 1</b></div><button class="btn" id="undoBtn" style="width:auto;margin:0;padding:8px 14px;font-size:12px;opacity:.5;" disabled>← Zurück</button></div>';
  html+='</div>';
  html+='<div id="drawResult"></div>';
  contentEl.innerHTML=html;

  drawContourMap(document.getElementById('dMap'),shape,minAlt,maxAlt,interval,path);
  const mapC=document.getElementById('dMap');
  const mapCtx=mapC.getContext('2d');
  samples.forEach((s,i)=>{
    const cx=s.x*mapC.width,cy=s.y*mapC.height;
    mapCtx.beginPath();mapCtx.arc(cx,cy,10,0,Math.PI*2);
    mapCtx.fillStyle='#fff';mapCtx.fill();
    mapCtx.strokeStyle='#c2762d';mapCtx.lineWidth=2.5;mapCtx.stroke();
    mapCtx.font='bold 11px -apple-system,sans-serif';mapCtx.fillStyle='#c2762d';
    mapCtx.textAlign='center';mapCtx.fillText(i+1,cx,cy+4);
  });

  const profC=document.getElementById('dProf');
  const W=300,H=180;profC.width=W;profC.height=H;
  const ctx=profC.getContext('2d');
  const pad={l:38,r:12,t:14,b:28};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;

  function drawGrid(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#f9f7f1';ctx.fillRect(0,0,W,H);
    const altLevels=[];for(let a=minAlt;a<=maxAlt;a+=interval)altLevels.push(a);
    ctx.font='10px -apple-system,sans-serif';ctx.textAlign='right';
    altLevels.forEach(a=>{
      const y=pad.t+ph*(1-(a-minAlt)/(maxAlt-minAlt));
      const major=(a%100===0);
      ctx.strokeStyle=major?'#ccc':'#e8e8e8';ctx.lineWidth=major?1.2:0.7;
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();
      ctx.fillStyle=major?'#777':'#aaa';
      ctx.fillText(a+'m',pad.l-4,y+3);
    });
    ctx.strokeStyle='#e8e8e8';ctx.lineWidth=1;
    samples.forEach((s,i)=>{
      const x=pad.l+s.t*pw;
      ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+ph);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#aaa';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='center';
      ctx.fillText(i+1,x,H-10);
    });
    ctx.strokeStyle='#999';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+ph);ctx.lineTo(pad.l+pw,pad.t+ph);ctx.stroke();
    ctx.fillStyle='#c2762d';ctx.font='bold 11px Georgia,serif';ctx.textAlign='center';
    ctx.fillText('A',pad.l,H-2);ctx.fillText('B',pad.l+pw,H-2);
  }
  drawGrid();

  let placed=[];let currentIdx=0;let phase='place';

  function altToY(alt){return pad.t+ph*(1-(alt-minAlt)/(maxAlt-minAlt));}
  function yToAlt(y){const a=minAlt+(1-(y-pad.t)/ph)*(maxAlt-minAlt);return Math.round(a/interval)*interval;}

  function redrawProfile(){
    drawGrid();
    if(placed.length>1){
      ctx.beginPath();ctx.strokeStyle='#5a3e15';ctx.lineWidth=2.5;
      placed.forEach((p,i)=>{const x=pad.l+samples[i].t*pw,y=altToY(p);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();
      ctx.lineTo(pad.l+samples[placed.length-1].t*pw,pad.t+ph);
      ctx.lineTo(pad.l+samples[0].t*pw,pad.t+ph);ctx.closePath();
      ctx.fillStyle='rgba(194,118,45,.08)';ctx.fill();
    }
    placed.forEach((alt,i)=>{
      const x=pad.l+samples[i].t*pw,y=altToY(alt);
      ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);
      ctx.fillStyle='#c2762d';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    });
    if(phase==='place'&&currentIdx<N){
      const x=pad.l+samples[currentIdx].t*pw;
      ctx.strokeStyle='rgba(194,118,45,.4)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+ph);ctx.stroke();ctx.setLineDash([]);
    }
  }

  const grid=document.getElementById('drawGrid');
  grid.style.cursor='pointer';
  const undoBtn=document.getElementById('undoBtn');
  undoBtn.onclick=function(){
    if(phase!=='place'||placed.length===0)return;
    placed.pop();currentIdx--;
    redrawProfile();
    document.getElementById('drawHint').innerHTML='Tippe die richtige Höhe für <b>Punkt '+(currentIdx+1)+'</b>';
    undoBtn.disabled=placed.length===0;undoBtn.style.opacity=placed.length===0?'.5':'1';
  };

  grid.addEventListener('click',function(e){
    if(phase!=='place')return;
    const rect=profC.getBoundingClientRect();
    const scaleY=H/rect.height;
    const cy=(e.clientY-rect.top)*scaleY;
    const alt=yToAlt(cy);
    const clamped=Math.max(minAlt,Math.min(maxAlt,alt));
    placed.push(clamped);
    currentIdx++;
    undoBtn.disabled=false;undoBtn.style.opacity='1';
    redrawProfile();
    if(currentIdx<N){
      document.getElementById('drawHint').innerHTML='Tippe die richtige Höhe für <b>Punkt '+(currentIdx+1)+'</b>';
    }else{
      undoBtn.disabled=true;undoBtn.style.opacity='.5';
      finishPlacing();
    }
  });

  function finishPlacing(){
    phase='review';
    grid.style.cursor='default';
    drawGrid();
    ctx.beginPath();ctx.strokeStyle='#c2762d';ctx.lineWidth=2.5;ctx.setLineDash([]);
    placed.forEach((alt,i)=>{const x=pad.l+samples[i].t*pw,y=altToY(alt);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
    ctx.beginPath();ctx.strokeStyle='var(--right)';ctx.lineWidth=2;ctx.setLineDash([5,3]);
    samples.forEach((s,i)=>{const x=pad.l+s.t*pw,y=altToY(s.alt);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.setLineDash([]);
    placed.forEach((alt,i)=>{
      const x=pad.l+samples[i].t*pw,y=altToY(alt);
      const correct=Math.abs(alt-samples[i].alt)<=interval*.6;
      ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);
      ctx.fillStyle=correct?'var(--right)':'var(--wrong)';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    });
    const score=placed.filter((a,i)=>Math.abs(a-samples[i].alt)<=interval*.6).length;
    let hint='<b>'+score+' / '+N+' Punkte richtig!</b> ';
    hint+='<span style="color:var(--right)">Grün = dein Profil</span> · <span style="color:var(--right);opacity:.6">gestrichelt = richtige Lösung</span>';
    document.getElementById('drawHint').innerHTML=hint;
    showSteepQuestion();
  }

  function showSteepQuestion(){
    let maxSlope=0,maxIdx=0,minSlope=Infinity,minIdx=0;
    for(let i=0;i<samples.length-1;i++){
      const dAlt=Math.abs(samples[i+1].alt-samples[i].alt);
      const dDist=samples[i+1].t-samples[i].t;
      const slope=dAlt/dDist;
      if(slope>maxSlope){maxSlope=slope;maxIdx=i;}
      if(slope<minSlope){minSlope=slope;minIdx=i;}
    }
    phase='steep';
    let html='<div class="card" style="margin-top:8px;"><div class="card-title">Frage</div>';
    html+='<div class="quiz-q">Zwischen welchen Punkten ist es am <b>steilsten</b>?</div>';
    html+='<div class="seg-row" id="steepRow">';
    for(let i=0;i<N-1;i++){
      html+='<button class="steep-btn" data-i="'+i+'">'+(i+1)+'→'+(i+2)+'</button>';
    }
    html+='</div><div id="steepFb" style="margin-top:8px;"></div></div>';
    document.getElementById('drawResult').innerHTML=html;

    document.querySelectorAll('#steepRow .steep-btn').forEach(b=>{
      b.onclick=()=>{
        const pick=parseInt(b.dataset.i);
        document.querySelectorAll('#steepRow .steep-btn').forEach(x=>{
          x.disabled=true;
          if(parseInt(x.dataset.i)===maxIdx)x.classList.add('correct');
          else if(x===b&&pick!==maxIdx)x.classList.add('incorrect');
        });
        const ok=pick===maxIdx;
        document.getElementById('steepFb').innerHTML='<p class="result-hint">'+(ok?'✓ Richtig! Dort liegen die Höhenlinien am engsten.':'✗ Am steilsten ist es zwischen <b>'+(maxIdx+1)+'→'+(maxIdx+2)+'</b>.')+'</p><button class="btn" id="flatBtn">Weiter: Wo ist es am flachsten? →</button>';
        document.getElementById('flatBtn').onclick=()=>showFlatQuestion(minIdx);
      };
    });
  }

  function showFlatQuestion(correctIdx){
    phase='flat';
    let html='<div class="card" style="margin-top:8px;"><div class="card-title">Frage</div>';
    html+='<div class="quiz-q">Zwischen welchen Punkten ist es am <b>flachsten</b>?</div>';
    html+='<div class="seg-row" id="flatRow">';
    for(let i=0;i<N-1;i++){
      html+='<button class="steep-btn" data-i="'+i+'">'+(i+1)+'→'+(i+2)+'</button>';
    }
    html+='</div><div id="flatFb" style="margin-top:8px;"></div></div>';
    document.getElementById('drawResult').innerHTML=html;

    document.querySelectorAll('#flatRow .steep-btn').forEach(b=>{
      b.onclick=()=>{
        const pick=parseInt(b.dataset.i);
        document.querySelectorAll('#flatRow .steep-btn').forEach(x=>{
          x.disabled=true;
          if(parseInt(x.dataset.i)===correctIdx)x.classList.add('correct');
          else if(x===b&&pick!==correctIdx)x.classList.add('incorrect');
        });
        const ok=pick===correctIdx;
        document.getElementById('flatFb').innerHTML='<p class="result-hint">'+(ok?'✓ Richtig! Dort liegen die Linien am weitesten auseinander.':'✗ Am flachsten ist es zwischen <b>'+(correctIdx+1)+'→'+(correctIdx+2)+'</b>.')+'</p><button class="btn" id="newDraw">Neue Aufgabe →</button>';
        document.getElementById('newDraw').onclick=()=>{rngSeed=Date.now()%100000;renderDraw();};
      };
    });
  }
}

/* ━━━━━━ TWO PATHS COMPARISON MODE ━━━━━━ */
function drawProfileWithMarkers(canvas,shape,minAlt,maxAlt,interval,path,color,N){
  // Draw profile and add numbered segment markers; return sample heights
  drawProfile(canvas,shape,minAlt,maxAlt,interval,path);
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const pad={l:40,r:12,t:14,b:24};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  // Sample N evenly spaced points and draw markers
  const pts=[];
  for(let i=0;i<N;i++){
    const t=i/(N-1);
    const fi=t*(path.length-1);const idx=Math.min(path.length-2,Math.floor(fi));const frac=fi-idx;
    const px=path[idx].x*(1-frac)+path[idx+1].x*frac;
    const py=path[idx].y*(1-frac)+path[idx+1].y*frac;
    const h=getHeight(shape,px,py,minAlt,maxAlt);
    pts.push({t,alt:h});
    const x=pad.l+t*pw;
    const y=pad.t+ph*(1-(h-minAlt)/(maxAlt-minAlt));
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='bold 9px -apple-system,sans-serif';ctx.fillStyle=color;ctx.textAlign='center';
    ctx.fillText(i+1,x,y-9);
  }
  return pts;
}

function renderTwoPaths(){
  const shapes=advanced?[...BASIC_SHAPES,...ADV_SHAPES]:BASIC_SHAPES;
  const goodShapes=['peak','ridge','valley','ascent','hills','adv_mountain','adv_valley','adv_ridge'];
  const pool=goodShapes.filter(s=>shapes.includes(s));
  const shape=pool[Math.floor(rng()*pool.length)];
  const minAlt=advanced?300:200,maxAlt=advanced?1100:600,interval=50;

  // Generate two paths sharing start/end
  const seed1=Math.floor(rng()*99999);
  const pathShort=genPath(seed1,5);
  const pathLong=(function(){
    let s=seed1+7777;const lr=()=>{s=(s*16807)%2147483647;return s/2147483647;};
    const startPt=pathShort[0],endPt=pathShort[pathShort.length-1];
    const ctrl=[startPt];
    const nMid=7;
    for(let i=1;i<=nMid;i++){
      const t=i/(nMid+1);
      const baseY=startPt.y*(1-t)+endPt.y*t;
      const offset=(lr()-.5)*.5;
      ctrl.push({x:t*.9+.05,y:Math.max(.08,Math.min(.92,baseY+offset))});
    }
    ctrl.push(endPt);
    const pts=[];const segments=40;
    for(let i=0;i<ctrl.length-1;i++){
      const p0=ctrl[Math.max(0,i-1)],p1=ctrl[i],p2=ctrl[i+1],p3=ctrl[Math.min(ctrl.length-1,i+2)];
      const steps=(i===ctrl.length-2)?segments+1:segments;
      for(let j=0;j<steps;j++){
        const t=j/segments;const t2=t*t,t3=t2*t;
        const x=0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
        const y=0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3);
        pts.push({x:Math.max(.02,Math.min(.98,x)),y:Math.max(.02,Math.min(.98,y))});
      }
    }
    pts[pts.length-1]=endPt;
    return pts;
  })();

  // Compute steepness per unit path length
  function computeSteepness(p){
    const nSamp=30;const heights=[];
    for(let i=0;i<nSamp;i++){
      const t=i/(nSamp-1);const fi=t*(p.length-1);
      const idx=Math.min(p.length-2,Math.floor(fi));const frac=fi-idx;
      const px=p[idx].x*(1-frac)+p[idx+1].x*frac;
      const py=p[idx].y*(1-frac)+p[idx+1].y*frac;
      heights.push(getHeight(shape,px,py,minAlt,maxAlt));
    }
    let total=0;
    for(let i=0;i<heights.length-1;i++)total+=Math.abs(heights[i+1]-heights[i]);
    let pathLen=0;
    for(let i=0;i<p.length-1;i++){
      const dx=p[i+1].x-p[i].x,dy=p[i+1].y-p[i].y;
      pathLen+=Math.sqrt(dx*dx+dy*dy);
    }
    return total/Math.max(.01,pathLen);
  }

  // A = steeper, B = gentler
  let pA=pathShort,pB=pathLong;
  if(computeSteepness(pathShort)<computeSteepness(pathLong)){
    [pA,pB]=[pB,pA];
  }

  const colorA='#c2762d',colorB='#4a7fb5';
  const nameA='Orange',nameB='Blau';
  const N=5; // segment markers per path

  let html='<div class="card"><div class="card-title">Zwei Wege vergleichen</div>';
  html+='<div class="card-desc">Zwei Wanderer gehen von A nach B — auf verschiedenen Wegen. Tippe auf einen Weg in der Karte, um sein Höhenprofil zu sehen!</div>';
  html+='<canvas id="dMap2" style="cursor:pointer;"></canvas>';
  html+='<p style="font-size:11px;color:var(--ink-soft);margin:6px 0 0;text-align:center;"><span style="color:'+colorA+';font-weight:700;">━</span> Weg '+nameA+' &nbsp; <span style="color:'+colorB+';font-weight:700;">╍</span> Weg '+nameB+'</p></div>';
  html+='<div id="tp-profile" style="margin-top:8px;"></div>';
  html+='<div id="tp-questions"></div>';
  contentEl.innerHTML=html;

  // Draw map with both paths
  const mapC=document.getElementById('dMap2');
  drawContourMap(mapC,shape,minAlt,maxAlt,interval,null);
  const mapCtx=mapC.getContext('2d');
  const MW=mapC.width,MH=mapC.height;

  mapCtx.setLineDash([]);mapCtx.strokeStyle=colorA;mapCtx.lineWidth=3.5;
  mapCtx.beginPath();
  pA.forEach((p,i)=>{i===0?mapCtx.moveTo(p.x*MW,p.y*MH):mapCtx.lineTo(p.x*MW,p.y*MH);});
  mapCtx.stroke();
  mapCtx.strokeStyle=colorB;mapCtx.lineWidth=3.5;mapCtx.setLineDash([8,5]);
  mapCtx.beginPath();
  pB.forEach((p,i)=>{i===0?mapCtx.moveTo(p.x*MW,p.y*MH):mapCtx.lineTo(p.x*MW,p.y*MH);});
  mapCtx.stroke();mapCtx.setLineDash([]);

  mapCtx.font='bold 14px Georgia,serif';mapCtx.textAlign='center';
  mapCtx.fillStyle='#333';
  mapCtx.fillText('A',pA[0].x*MW,pA[0].y*MH-12);
  mapCtx.fillText('B',pA[pA.length-1].x*MW,pA[pA.length-1].y*MH-12);

  // Tap on map to show profile of nearest path
  const profDiv=document.getElementById('tp-profile');
  function showPathProfile(which){
    const p=which==='A'?pA:pB;
    const color=which==='A'?colorA:colorB;
    const name=which==='A'?nameA:nameB;
    profDiv.innerHTML='<div class="card"><div class="card-title" style="color:'+color+'">Profil Weg '+name+'</div><canvas id="tpProfPreview"></canvas></div>';
    drawProfileWithMarkers(document.getElementById('tpProfPreview'),shape,minAlt,maxAlt,interval,p,color,N);
  }
  mapC.addEventListener('click',function(e){
    const rect=mapC.getBoundingClientRect();
    const cx=(e.clientX-rect.left)/rect.width;
    const cy=(e.clientY-rect.top)/rect.height;
    // Find nearest path
    function distToPath(p){
      let min=Infinity;
      for(let i=0;i<p.length;i+=5){
        const dx=p[i].x-cx,dy=p[i].y-cy;
        min=Math.min(min,dx*dx+dy*dy);
      }
      return min;
    }
    showPathProfile(distToPath(pA)<distToPath(pB)?'A':'B');
  });

  // Questions
  const qDiv=document.getElementById('tp-questions');

  function showStep1(){
    let h='<div class="card" style="margin-top:8px;"><div class="card-title">Frage 1</div>';
    h+='<div class="quiz-q">Welcher Weg ist <b>entspannter</b> (weniger steil)?</div>';
    h+='<div class="seg-row">';
    h+='<button class="steep-btn" id="tpA" style="border-color:'+colorA+'">Weg '+nameA+'</button>';
    h+='<button class="steep-btn" id="tpB" style="border-color:'+colorB+'">Weg '+nameB+'</button>';
    h+='</div><div id="tpFb1" style="margin-top:8px;"></div></div>';
    qDiv.innerHTML=h;
    document.getElementById('tpA').onclick=()=>answerStep1('A');
    document.getElementById('tpB').onclick=()=>answerStep1('B');
  }

  function answerStep1(pick){
    const correct='B';
    document.getElementById('tpA').disabled=true;
    document.getElementById('tpB').disabled=true;
    if(pick===correct)document.getElementById('tpB').classList.add('correct');
    else{document.getElementById('tpA').classList.add('incorrect');document.getElementById('tpB').classList.add('correct');}
    const ok=pick===correct;
    document.getElementById('tpFb1').innerHTML='<p class="result-hint">'+(ok?'✓ Richtig! Weg '+nameB+' verläuft flacher — die Höhenlinien liegen weiter auseinander.':'✗ Weg '+nameB+' ist entspannter — er quert weniger Höhenlinien auf engem Raum.')+'</p><button class="btn" id="tpNext1">Weiter: Steilster Abschnitt →</button>';
    document.getElementById('tpNext1').onclick=showStep2;
  }

  function showStep2(){
    // Show profile A with numbered markers, ask for steepest segment
    let h='<div class="card" style="margin-top:8px;"><div class="card-title">Frage 2</div>';
    h+='<div class="quiz-q">Wo ist <b>Weg '+nameA+'</b> am <b>steilsten</b>?</div>';
    h+='<canvas id="profA2"></canvas>';
    h+='<div class="seg-row" id="steepRowA" style="margin-top:8px;">';
    for(let i=0;i<N-1;i++) h+='<button class="steep-btn" data-i="'+i+'">'+(i+1)+'→'+(i+2)+'</button>';
    h+='</div><div id="tpFb2" style="margin-top:8px;"></div></div>';
    qDiv.innerHTML=h;

    const ptsA=drawProfileWithMarkers(document.getElementById('profA2'),shape,minAlt,maxAlt,interval,pA,colorA,N);
    let maxSl=0,maxIdx=0;
    for(let i=0;i<ptsA.length-1;i++){
      const sl=Math.abs(ptsA[i+1].alt-ptsA[i].alt)/(ptsA[i+1].t-ptsA[i].t);
      if(sl>maxSl){maxSl=sl;maxIdx=i;}
    }

    document.querySelectorAll('#steepRowA .steep-btn').forEach(b=>{
      b.onclick=()=>{
        const pick=parseInt(b.dataset.i);
        document.querySelectorAll('#steepRowA .steep-btn').forEach(x=>{
          x.disabled=true;
          if(parseInt(x.dataset.i)===maxIdx)x.classList.add('correct');
          else if(x===b&&pick!==maxIdx)x.classList.add('incorrect');
        });
        const ok=pick===maxIdx;
        document.getElementById('tpFb2').innerHTML='<p class="result-hint">'+(ok?'✓ Richtig! Dort liegen die Höhenlinien am engsten.':'✗ Am steilsten ist Abschnitt <b>'+(maxIdx+1)+'→'+(maxIdx+2)+'</b>.')+'</p><button class="btn" id="tpNext2">Weiter: Flachster Abschnitt →</button>';
        document.getElementById('tpNext2').onclick=showStep3;
      };
    });
  }

  function showStep3(){
    // Show profile B with numbered markers, ask for flattest segment
    let h='<div class="card" style="margin-top:8px;"><div class="card-title">Frage 3</div>';
    h+='<div class="quiz-q">Wo ist <b>Weg '+nameB+'</b> am <b>flachsten</b>?</div>';
    h+='<canvas id="profB2"></canvas>';
    h+='<div class="seg-row" id="flatRowB" style="margin-top:8px;">';
    for(let i=0;i<N-1;i++) h+='<button class="steep-btn" data-i="'+i+'">'+(i+1)+'→'+(i+2)+'</button>';
    h+='</div><div id="tpFb3" style="margin-top:8px;"></div></div>';
    qDiv.innerHTML=h;

    const ptsB=drawProfileWithMarkers(document.getElementById('profB2'),shape,minAlt,maxAlt,interval,pB,colorB,N);
    let minSl=Infinity,minIdx=0;
    for(let i=0;i<ptsB.length-1;i++){
      const sl=Math.abs(ptsB[i+1].alt-ptsB[i].alt)/(ptsB[i+1].t-ptsB[i].t);
      if(sl<minSl){minSl=sl;minIdx=i;}
    }

    document.querySelectorAll('#flatRowB .steep-btn').forEach(b=>{
      b.onclick=()=>{
        const pick=parseInt(b.dataset.i);
        document.querySelectorAll('#flatRowB .steep-btn').forEach(x=>{
          x.disabled=true;
          if(parseInt(x.dataset.i)===minIdx)x.classList.add('correct');
          else if(x===b&&pick!==minIdx)x.classList.add('incorrect');
        });
        const ok=pick===minIdx;
        document.getElementById('tpFb3').innerHTML='<p class="result-hint">'+(ok?'✓ Richtig! Dort sind die Höhenlinien am weitesten auseinander.':'✗ Am flachsten ist Abschnitt <b>'+(minIdx+1)+'→'+(minIdx+2)+'</b>.')+'</p><button class="btn" id="tpDone">Neue Aufgabe →</button>';
        document.getElementById('tpDone').onclick=()=>{rngSeed=Date.now()%100000;renderTwoPaths();};
      };
    });
  }

  showStep1();
}

/* ━━━━━━ PROFILE QUIZ ━━━━━━ */
function renderQuiz(){
  if(quizRound>=MAX_ROUNDS){renderDone(()=>{quizScore=0;quizRound=0;rngSeed=Date.now()%100000;renderQuiz();});return;}

  // Pick 4 different shapes from appropriate pool
  const pool=advanced?[...BASIC_SHAPES,...ADV_SHAPES]:[...BASIC_SHAPES];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const chosen=pool.slice(0,4);
  const correct=Math.floor(rng()*4);
  const paths=chosen.map((_,i)=>genPath(Math.floor(rng()*99999),5+Math.floor(rng()*3)));
  const minAlt=advanced?300:200,maxAlt=advanced?1100:600,interval=advanced?50:100;

  let html='<div class="quiz-card"><div class="card-title">Frage '+(quizRound+1)+' / '+MAX_ROUNDS+'</div>';
  html+='<div class="quiz-q">Welche Höhenlinienkarte passt zu diesem Profil?</div>';
  html+='<canvas id="cQProf"></canvas>';
  html+='<div class="quiz-grid">';
  for(let i=0;i<4;i++)html+='<div class="quiz-opt" data-i="'+i+'"><canvas id="cO'+i+'"></canvas><span class="badge"></span></div>';
  html+='</div><div id="fb"></div></div>';
  html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
  contentEl.innerHTML=html;

  drawProfile(document.getElementById('cQProf'),chosen[correct],minAlt,maxAlt,interval,paths[correct]);
  for(let i=0;i<4;i++)drawContourMap(document.getElementById('cO'+i),chosen[i],minAlt,maxAlt,interval,paths[i]);

  document.querySelectorAll('.quiz-opt').forEach(el=>{
    el.onclick=()=>{
      const pick=parseInt(el.dataset.i);
      document.querySelectorAll('.quiz-opt').forEach(o=>{o.onclick=null;const idx=parseInt(o.dataset.i);if(idx===correct)o.classList.add('correct');else if(idx===pick&&pick!==correct)o.classList.add('incorrect');});
      document.querySelectorAll('.quiz-opt .badge').forEach((b,bi)=>{if(bi===correct)b.textContent='✓';else if(bi===pick&&pick!==correct)b.textContent='✗';});
      if(pick===correct)quizScore++;quizRound++;
      document.getElementById('sc').textContent=quizScore;
      const fb=document.getElementById('fb');
      fb.innerHTML='<p class="result-hint">'+(pick===correct?'✓ Richtig!':'✗ Das war leider falsch.')+'</p><button class="btn" id="nx">Weiter →</button>';
      document.getElementById('nx').onclick=renderQuiz;
    };
  });
}

/* ━━━━━━ MASSSTAB QUIZ ━━━━━━ */
const MSQ=[
  {q:'Maßstab 1:25.000 — 4 cm auf der Karte sind in echt …',ans:'1000 m',opts:['250 m','1000 m','4000 m','25 km']},
  {q:'Maßstab 1:50.000 — 2 cm auf der Karte sind in echt …',ans:'1 km',opts:['500 m','1 km','2 km','50 km']},
  {q:'Maßstab 1:25.000 — 1 cm auf der Karte sind in echt …',ans:'250 m',opts:['25 m','250 m','2,5 km','25 km']},
  {q:'Maßstab 1:10.000 — 5 cm auf der Karte sind in echt …',ans:'500 m',opts:['50 m','100 m','500 m','5 km']},
  {q:'Maßstab 1:50.000 — 3 km in echt sind auf der Karte …',ans:'6 cm',opts:['3 cm','6 cm','15 cm','60 cm']},
  {q:'Maßstab 1:25.000 — 500 m in echt sind auf der Karte …',ans:'2 cm',opts:['0,5 cm','2 cm','5 cm','20 cm']},
  {q:'Was bedeutet „1:25.000"?',ans:'1 cm = 250 m',opts:['1 cm = 25 m','1 cm = 250 m','1 cm = 2,5 km','1 m = 25 km']},
  {q:'Welcher Maßstab zeigt mehr Details?',ans:'1:10.000',opts:['1:10.000','1:50.000','1:100.000','1:250.000']},
  {q:'Maßstab 1:100.000 — 1 cm auf der Karte sind in echt …',ans:'1 km',opts:['100 m','1 km','10 km','100 km']},
  {q:'Maßstab 1:25.000 — 2 km in echt sind auf der Karte …',ans:'8 cm',opts:['2 cm','4 cm','8 cm','20 cm']},
];

function renderMassstab(){
  if(quizRound>=MAX_ROUNDS){renderDone(()=>{quizScore=0;quizRound=0;rngSeed=Date.now()%100000;renderMassstab();});return;}
  // Shuffle pool
  const pool=[...MSQ];for(let i=pool.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const q=pool[quizRound%pool.length];
  const opts=[...q.opts];for(let i=opts.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}

  let html='<div class="quiz-card"><div class="card-title">Frage '+(quizRound+1)+' / '+MAX_ROUNDS+'</div>';
  html+='<div class="quiz-q">'+q.q+'</div>';
  opts.forEach(o=>{html+='<button class="fopt" data-a="'+o+'">'+o+'</button>';});
  html+='<div id="mFb"></div></div>';
  html+='<div class="scorebar"><div class="stat"><b id="ms">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
  html+='<div class="info-box"><h3>Tipp:</h3><p><b>1:25.000</b> heißt: 1 cm auf der Karte = 25.000 cm in echt = <b>250 m</b></p><p>Rechne: Karte in cm × Maßstabszahl = Wirklichkeit in cm. Dann in m oder km umrechnen!</p></div>';
  contentEl.innerHTML=html;

  contentEl.querySelectorAll('.fopt').forEach(b=>{
    b.onclick=()=>{
      contentEl.querySelectorAll('.fopt').forEach(x=>{x.disabled=true;if(x.dataset.a===q.ans)x.classList.add('correct');else if(x===b&&b.dataset.a!==q.ans)x.classList.add('incorrect');});
      if(b.dataset.a===q.ans)quizScore++;quizRound++;
      document.getElementById('ms').textContent=quizScore;
      document.getElementById('mFb').innerHTML='<p class="result-hint">'+(b.dataset.a===q.ans?'✓ Richtig!':'✗ Richtig wäre: <b>'+q.ans+'</b>')+'</p><button class="btn" id="mn">Weiter →</button>';
      document.getElementById('mn').onclick=renderMassstab;
    };
  });
}

/* ━━━━━━ DONE ━━━━━━ */
function renderDone(restartFn){
  const pct=Math.round(quizScore/MAX_ROUNDS*100);
  contentEl.innerHTML='<div class="quiz-card"><div class="done-box"><div class="done-e">'+(pct>=80?'🏆':pct>=50?'👏':'📚')+'</div><div class="done-s">'+quizScore+' / '+MAX_ROUNDS+' richtig</div><div class="done-sub">'+pct+'%</div><button class="btn" id="re">Nochmal</button></div></div>';
  document.getElementById('re').onclick=restartFn;
}

/* ━━━━━━ INIT ━━━━━━ */
renderLearn();
</script>
</body>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e9ece4">
<title>Deutschland lernen</title>
<style>
:root{
  --paper:#e9ece4;--paper-2:#f3f5ef;--ink:#26302e;--ink-soft:#5d6764;
  --line:#c4ccc1;--land:#dde2d7;--sea:#cde0e8;--sea-s:#9fc5d0;
  --water:#3a7d8c;--amber:#c2762d;--right:#3f8f5b;--wrong:#bd5239;
  --shadow:0 2px 12px rgba(38,48,46,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,system-ui,"Segoe UI",sans-serif;line-height:1.4;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);-webkit-text-size-adjust:100%;}
.wrap{max-width:560px;margin:0 auto;padding:13px 13px 36px;}
header{margin-bottom:9px;}
.eyebrow{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--amber);font-weight:700;margin:0 0 1px;}
h1{font-family:Georgia,serif;font-weight:600;font-size:25px;line-height:1.05;margin:0;}
.lede{color:var(--ink-soft);font-size:12px;margin:2px 0 0;}
.mode-bar{display:flex;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:3px;margin:11px 0 7px;gap:3px;}
.mbtn{flex:1;border:0;background:transparent;color:var(--ink-soft);font-size:11.5px;font-weight:600;padding:8px 4px;border-radius:8px;cursor:pointer;font-family:inherit;transition:.12s;text-align:center;line-height:1.25;}
.mbtn[aria-pressed="true"]{background:var(--ink);color:var(--paper-2);}
/* chips */
.chips-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.chip{border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);font-size:12px;font-weight:600;padding:6px 10px;border-radius:999px;cursor:pointer;font-family:inherit;transition:.12s;white-space:nowrap;}
.chip[aria-pressed="true"]{background:var(--amber);border-color:var(--amber);color:#fff;}
.chip .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:1px;}
.gear-btn{flex:0 0 auto;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);font-size:14px;padding:6px 9px;border-radius:999px;cursor:pointer;line-height:1;transition:.12s;}
.gear-btn.on{background:var(--ink);color:var(--paper-2);}
/* filter */
.fpanel{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:6px;}
.fph{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.fpt{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);flex:1;}
.fmb{border:1px solid var(--line);background:transparent;color:var(--ink-soft);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;cursor:pointer;font-family:inherit;}
.fit{display:flex;flex-wrap:wrap;gap:5px;}
.fc{border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);font-size:12px;font-weight:600;padding:5px 10px;border-radius:999px;cursor:pointer;font-family:inherit;transition:.1s;}
.fc.on{background:var(--ink);border-color:var(--ink);color:var(--paper-2);}
/* abfrage progress bar */
.aq-bar{display:none;align-items:center;gap:10px;margin-bottom:6px;}
.aq-prog-wrap{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
.aq-prog-fill{height:100%;background:var(--amber);border-radius:3px;transition:width .3s;}
.aq-cat{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);}
/* map */
.mapcard{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:7px;margin-top:8px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
svg.map{width:100%;height:auto;max-height:60vh;display:block;touch-action:manipulation;}
/* SVG */
.sea-bg{fill:var(--sea);stroke:none;pointer-events:none;}
.sea-play{fill:var(--sea);stroke:none;cursor:pointer;transition:.12s;}
.sea-play.sel{stroke:var(--amber);stroke-width:2;}
.sea-play.ok{fill:#9dd4c0;} .sea-play.no{fill:#e8a898;}
.region{stroke:#fff;stroke-width:.8;transition:fill .12s;}
.base-land{fill:var(--land);pointer-events:none;}
.base-nb{fill:#e8e4da;stroke:#d0cab8;pointer-events:none;}
.r-play{cursor:pointer;stroke:#fff;stroke-width:.8;}
.r-play.sel{stroke:var(--amber);stroke-width:1.8;}
.r-play.ok{fill:var(--right)!important;} .r-play.no{fill:var(--wrong)!important;}
.geb{fill:#c4aa72;fill-opacity:.58;stroke:#8a7040;stroke-width:.8;cursor:pointer;transition:.12s;}
.geb.sel{fill:var(--amber);fill-opacity:.9;stroke:var(--amber);}
.geb.ok{fill:var(--right);fill-opacity:.85;stroke:var(--right);}
.geb.no{fill:var(--wrong);fill-opacity:.85;stroke:var(--wrong);}
.geb-dim{fill:#c4aa72;fill-opacity:.2;stroke:#8a7040;stroke-width:.5;pointer-events:none;}
.geb-ov{fill:#c4aa72;fill-opacity:.35;stroke:#8a7040;stroke-width:.5;pointer-events:none;}
.rl{stroke:var(--water);stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;}
.rl.sel{stroke:var(--amber);stroke-width:3.4;}
.rl.ok{stroke:var(--right);} .rl.no{stroke:var(--wrong);}
.rl-dim{stroke:var(--water);stroke-width:1.4;fill:none;stroke-linecap:round;opacity:.25;pointer-events:none;}
.rl-ov{stroke:var(--water);stroke-width:1.5;fill:none;stroke-linecap:round;opacity:.65;pointer-events:none;}
.hit{stroke:transparent;stroke-width:16;fill:none;cursor:pointer;stroke-linecap:round;}
.pin{cursor:pointer;}
.pin .ring{fill:#fff;stroke-width:1.4;}
.city .ring{stroke:var(--amber);} .city .core{fill:var(--amber);}
.lake .ring{stroke:var(--water);} .lake .core{fill:var(--water);}
.island .ring{stroke:#3a6e8c;} .island .core{fill:#3a6e8c;}
.pin.sel .ring{stroke:var(--amber);stroke-width:2.5;}
.pin.ok .ring{stroke:var(--right);} .pin.ok .core{fill:var(--right);}
.pin.no .ring{stroke:var(--wrong);} .pin.no .core{fill:var(--wrong);}
.lbl{font-size:8px;font-weight:700;fill:var(--ink);paint-order:stroke;stroke:rgba(243,245,239,.9);stroke-width:2.5px;pointer-events:none;}
.lbl-sea{font-size:9.5px;font-weight:700;fill:#1a5f70;paint-order:stroke;stroke:var(--sea);stroke-width:3px;pointer-events:none;font-style:italic;}
.de-border{fill:none;stroke:rgba(38,48,46,.5);stroke-width:2.5;stroke-linejoin:round;pointer-events:none;}
.comp-a{fill:var(--amber);font-size:10px;text-anchor:middle;}
.comp-n{fill:var(--ink-soft);font-size:11px;font-weight:700;text-anchor:middle;}
/* overlay */
.ov-wrap{position:absolute;inset:0;pointer-events:none;display:flex;align-items:flex-end;z-index:10;}
.ov-panel{width:100%;background:rgba(243,245,239,.97);border-top:1px solid var(--line);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:13px 15px 15px;pointer-events:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);}
.ov-panel.show{transform:translateY(0);}
.ov-close{position:absolute;top:9px;right:11px;border:0;background:rgba(0,0,0,.08);color:var(--ink);width:25px;height:25px;border-radius:50%;font-size:13px;line-height:25px;text-align:center;cursor:pointer;padding:0;font-family:inherit;}
.ov-kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);font-weight:700;margin:0 0 3px;}
.ov-name{font-family:Georgia,serif;font-size:19px;font-weight:600;margin:0 0 2px;}
.ov-info{color:var(--ink-soft);font-size:13px;margin:0 0 10px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.opt{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:13.5px;font-weight:600;font-family:inherit;padding:11px 7px;border-radius:11px;cursor:pointer;text-align:center;transition:.1s;min-height:46px;}
.opt:active{transform:scale(.97);}
.opt.correct{background:var(--right);border-color:var(--right);color:#fff;}
.opt.incorrect{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.opt:disabled{cursor:default;}
.result-hint{font-size:13px;color:var(--ink-soft);margin:8px 0 0;}
.result-hint b{color:var(--ink);}
.btn{width:100%;margin-top:9px;border:0;background:var(--ink);color:var(--paper-2);font-size:14px;font-weight:700;font-family:inherit;padding:12px;border-radius:12px;cursor:pointer;}
/* controls row */
.ctrl-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;user-select:none;}
.toggle input{width:0;height:0;position:absolute;opacity:0;}
.sw{width:40px;height:24px;border-radius:999px;background:var(--line);position:relative;transition:.2s;flex:0 0 auto;}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle input:checked+.sw{background:var(--amber);}
.toggle input:checked+.sw::after{transform:translateX(16px);}
/* scorebar */
.scorebar{display:flex;gap:7px;margin-top:9px;}
.stat{flex:1;background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:7px 10px;text-align:center;}
.stat b{display:block;font-family:Georgia,serif;font-size:18px;line-height:1;}
.stat small{font-size:10px;color:var(--ink-soft);}
/* fragen + abfrage cards */
.frage-card{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow);margin-top:9px;}
.frage-q{font-size:15px;font-weight:600;margin:0 0 12px;line-height:1.45;}
.frage-opts,.frage-opts-col{display:flex;flex-direction:column;gap:7px;}
.fopt{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:14px;font-weight:600;font-family:inherit;padding:12px 13px;border-radius:11px;cursor:pointer;text-align:left;transition:.1s;}
.fopt.correct{background:var(--right);border-color:var(--right);color:#fff;}
.fopt.incorrect{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.fopt:disabled{cursor:default;}
.fopt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.fopt-g{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:13.5px;font-weight:600;font-family:inherit;padding:11px 8px;border-radius:11px;cursor:pointer;text-align:center;transition:.1s;min-height:46px;}
.fopt-g.correct{background:var(--right);border-color:var(--right);color:#fff;}
.fopt-g.incorrect{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.fopt-g:disabled{cursor:default;}
.fnav{display:flex;gap:8px;margin-top:11px;}
.fnav button{flex:1;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);font-size:13px;font-weight:600;font-family:inherit;padding:10px;border-radius:11px;cursor:pointer;}
.fnav button.pri{background:var(--ink);color:var(--paper-2);border-color:var(--ink);}
.fprog{font-size:11.5px;color:var(--ink-soft);margin-top:7px;text-align:center;}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:5px;letter-spacing:.04em;}
.tag.r{background:#ddd6e8;color:#4e2d6e;} .tag.l{background:#e8dfd6;color:#6e4e2d;}
.done-box{text-align:center;padding:8px 0;}
.done-e{font-size:26px;margin:0 0 4px;}
.done-s{font-family:Georgia,serif;font-size:19px;font-weight:600;margin:3px 0;}
.done-sub{color:var(--ink-soft);font-size:13px;margin:2px 0 10px;}
.note{font-size:10px;color:var(--ink-soft);margin:8px 2px 0;line-height:1.6;}
@media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <p class="eyebrow">Atlas · Übung</p>
  <h1>Deutschland lernen</h1>
  <p class="lede">Echte Karte, komplett offline.</p>
</header>
<div class="mode-bar" role="group">
  <button class="mbtn" id="m0" aria-pressed="true">Lernen</button>
  <button class="mbtn" id="m1" aria-pressed="false">Lern-Quiz</button>
  <button class="mbtn" id="m2" aria-pressed="false">Abfrage</button>
  <button class="mbtn" id="m3" aria-pressed="false">Wo ist?</button>
  <button class="mbtn" id="m4" aria-pressed="false">Fragen</button>
</div>

<!-- Abfrage-Quiz progress bar (mode 2 only) -->
<div class="aq-bar" id="aqBar">
  <div class="aq-prog-wrap"><div class="aq-prog-fill" id="aqFill" style="width:0%"></div></div>
  <span class="aq-cat" id="aqCatLabel"></span>
</div>

<!-- Chips + gear (hidden in mode 2) -->
<div id="chipsRow">
  <div class="chips-row">
    <div class="chips" id="chips"></div>
    <button class="gear-btn" id="gearBtn">⚙</button>
  </div>
  <div class="fpanel" id="fpanel" style="display:none">
    <div class="fph">
      <span class="fpt" id="fptitle">Auswahl</span>
      <button class="fmb" id="fAll">Alle</button>
      <button class="fmb" id="fNone">Keine</button>
    </div>
    <div class="fit" id="fitems"></div>
  </div>
</div>

<div class="mapcard">
  <svg class="map" id="svgMap" viewBox="0 0 600 760" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="ov-wrap" id="ovWrap">
    <div class="ov-panel" id="ovPanel">
      <button class="ov-close" id="ovClose">×</button>
      <div id="ovContent"></div>
    </div>
  </div>
</div>

<!-- Mode 0: label toggle -->
<div class="ctrl-row" id="learnCtrl" style="display:none">
  <label class="toggle"><input type="checkbox" id="lblToggle"><span class="sw"></span>Alle Namen anzeigen</label>
</div>
<!-- Mode 1: score bar -->
<div class="scorebar" id="scorebar" style="display:none">
  <div class="stat"><b id="sC">0</b><small>Richtig</small></div>
  <div class="stat"><b id="sD">0</b><small>Beantwortet</small></div>
  <div class="stat"><b id="sT">0</b><small>Gesamt</small></div>
</div>
<!-- Mode 2: abfrage card -->
<div id="aqArea" style="display:none">
  <div class="frage-card" id="aqCard"></div>
  <div class="fprog" id="aqProg"></div>
</div>
<!-- Mode 3: Wo ist? card -->
<div id="wiArea" style="display:none">
  <div class="frage-card" id="wiCard"></div>
  <div class="fprog" id="wiProg"></div>
</div>
<!-- Mode 4: overview label toggle + fragen card -->
<div class="ctrl-row" id="ovLabelCtrl" style="display:none">
  <label class="toggle"><input type="checkbox" id="ovLblToggle"><span class="sw"></span>Namen einblenden</label>
</div>
<div id="fragenArea" style="display:none">
  <div class="frage-card" id="frageCard"></div>
  <div class="fprog" id="fprog"></div>
</div>

<p class="note">Bundesländer &amp; Nachbarländer: echte Geometrie. Flüsse, Gebirge, Meere, Inseln: schematisch/vereinfacht.</p>
</div>

const RAD=Math.PI/180;

function eachP(g,fn){g.forEach(p=>p.forEach(r=>r.forEach(fn)));}
function buildProj(feats){
  let a=Infinity,b=-Infinity,c=Infinity,d=-Infinity;
  feats.forEach(f=>eachP(f.g,([lo,la])=>{const x=mX(lo),y=mY(la);if(x<a)a=x;if(x>b)b=x;if(y<c)c=y;if(y>d)d=y;}));
  const s=Math.min((W-2*PAD)/(b-a),(H-2*PAD)/(d-c));
  const ox=PAD+((W-2*PAD)-s*(b-a))/2,oy=PAD+((H-2*PAD)-s*(d-c))/2;
  proj=([lo,la])=>[ox+(mX(lo)-a)*s,oy+(d-mY(la))*s];
}
function ppath(g){let s='';g.forEach(pl=>pl.forEach(ring=>{ring.forEach((p,i)=>{const[x,y]=proj(p);s+=(i?'L':'M')+x.toFixed(1)+','+y.toFixed(1);});s+='Z';}));return s;}
function ptsp(pts){return pts.map((p,i)=>{const[x,y]=proj(p);return(i?'L':'M')+x.toFixed(1)+','+y.toFixed(1);}).join('')+'Z';}
function cen(g){let sx=0,sy=0,n=0;eachP(g,p=>{const[x,y]=proj(p);sx+=x;sy+=y;n++;});return[sx/n,sy/n];}
const pp=p=>proj(p);

/* ━━━━━━ STATE ━━━━━━ */
let mode=0,catKey='states',showLabels=false,showOvLabels=false,selKey=null,showFilter=false;
let disabled=mkDisabled();
// Lern-Quiz (mode 1)
let qPool=[],qAns={},qCorrect=0,qDone=0;
// Abfrage-Quiz (mode 2)
let aqPool=[],aqIdx=0,aqAns={},aqCorrect=0,aqAnswered=false,aqCurrent=null;
// Wo ist? (mode 3)
let wiPool=[],wiIdx=0,wiAns={},wiCorrect=0,wiAnswered=false,wiCurrent=null;
// Fragen (mode 4)
let fList=[],fIdx=0,fScore=0,fAnswered=false;

function isOn(ck,i){return !disabled[ck]||!disabled[ck].has(i);}
function activeItems(ck){return CAT[ck].get().filter((_,i)=>isOn(ck,i));}
function listFor(ck){return CAT[ck].get();}
function keyFor(ck,i){return ck+'_'+i;}
function nameOf(ck,it){return it.n||it.name;}
function infoOf(ck,it){return ck==='states'?SI[it.n]||'':ck==='neighbours'?NBI[it.n]||'':it.info||'';}

/* ━━━━━━ SVG helpers ━━━━━━ */
const NS='http://www.w3.org/2000/svg',svgMap=document.getElementById('svgMap');
function se(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function stxt(x,y,s,cls,anc){const e=se('text',{x,y,'text-anchor':anc||'middle',class:cls||'lbl'});e.textContent=s;return e;}

/* ━━━━━━ CHIPS ━━━━━━ */
const chipsEl=document.getElementById('chips');
CAT_ORDER.forEach(k=>{
  const c=CAT[k],bt=document.createElement('button');
  bt.className='chip';bt.setAttribute('aria-pressed',k==='states');
  bt.innerHTML='<span class="dot" style="background:'+c.color+'"></span>'+c.label;
  bt.onclick=()=>{catKey=k;[...chipsEl.children].forEach((ch,j)=>ch.setAttribute('aria-pressed',CAT_ORDER[j]===k));selKey=null;closeOv();renderFilter();initLernQuiz();if(mode===3){initWoIst();renderWiCard();}render();};
  chipsEl.appendChild(bt);
});

/* ━━━━━━ MODE ━━━━━━ */
[0,1,2,3,4].forEach(i=>document.getElementById('m'+i).onclick=()=>setMode(i));
function setMode(m){
  mode=m;
  [0,1,2,3,4].forEach(j=>document.getElementById('m'+j).setAttribute('aria-pressed',j===m));
  selKey=null;closeOv();
  document.getElementById('chipsRow').style.display=(m===2)?'none':'block';
  document.getElementById('aqBar').style.display=m===2?'flex':'none';
  document.getElementById('learnCtrl').style.display=m===0?'flex':'none';
  document.getElementById('scorebar').style.display=m===1?'flex':'none';
  document.getElementById('aqArea').style.display=m===2?'block':'none';
  document.getElementById('wiArea').style.display=m===3?'block':'none';
  document.getElementById('ovLabelCtrl').style.display=m===4?'flex':'none';
  document.getElementById('fragenArea').style.display=m===4?'block':'none';
  if(m===1){initLernQuiz();}
  else if(m===2){initAbfrage();renderAqCard();}
  else if(m===3){initWoIst();renderWiCard();}
  else if(m===4){buildFragen();renderFrage();}
  render();
}
document.getElementById('lblToggle').onchange=e=>{showLabels=e.target.checked;render();};
document.getElementById('ovLblToggle').onchange=e=>{showOvLabels=e.target.checked;render();};

/* ━━━━━━ GEAR / FILTER ━━━━━━ */
document.getElementById('gearBtn').onclick=()=>{
  showFilter=!showFilter;
  document.getElementById('gearBtn').classList.toggle('on',showFilter);
  document.getElementById('fpanel').style.display=showFilter?'block':'none';
  if(showFilter)renderFilter();
};
document.getElementById('fAll').onclick=()=>{if(disabled[catKey])disabled[catKey].clear();initLernQuiz();renderFilter();render();};
document.getElementById('fNone').onclick=()=>{disabled[catKey]=new Set(listFor(catKey).map((_,i)=>i));initLernQuiz();renderFilter();render();};
function renderFilter(){
  if(!showFilter)return;
  document.getElementById('fptitle').textContent=CAT[catKey].label+' – Auswahl';
  const el=document.getElementById('fitems');el.innerHTML='';
  listFor(catKey).forEach((it,i)=>{
    const on=isOn(catKey,i),bt=document.createElement('button');
    bt.className='fc'+(on?' on':'');bt.textContent=nameOf(catKey,it);
    bt.onclick=()=>{
      if(!disabled[catKey])disabled[catKey]=new Set();
      disabled[catKey].has(i)?disabled[catKey].delete(i):disabled[catKey].add(i);
      bt.className='fc'+(isOn(catKey,i)?' on':'');
      initLernQuiz();render();

}

/* ━━━━━━ OVERLAY ━━━━━━ */
function showOv(html){document.getElementById('ovContent').innerHTML=html;document.getElementById('ovPanel').classList.add('show');}
function closeOv(){document.getElementById('ovPanel').classList.remove('show');}
document.getElementById('ovClose').onclick=()=>{closeOv();selKey=null;render();};

/* ━━━━━━ LERN-QUIZ INIT ━━━━━━ */
function initLernQuiz(){
  if(mode!==1)return;
  const al=activeItems(catKey),fl=listFor(catKey);
  qPool=al.map(it=>{const idx=fl.findIndex(x=>nameOf(catKey,x)===nameOf(catKey,it));return{key:keyFor(catKey,idx),name:nameOf(catKey,it),item:it};});
  qAns={};qCorrect=0;qDone=0;
  document.getElementById('sC').textContent=0;document.getElementById('sD').textContent=0;document.getElementById('sT').textContent=qPool.length;
  closeOv();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickRand(arr,n){const a=shuffle([...arr]);return a.slice(0,n);}
function updQ(){document.getElementById('sC').textContent=qCorrect;document.getElementById('sD').textContent=qDone;document.getElementById('sT').textContent=qPool.length;}

/* ━━━━━━ ABFRAGE-QUIZ INIT ━━━━━━ */
function initAbfrage(){
  aqPool=[];
  CAT_ORDER.forEach(ck=>{
    const al=activeItems(ck);
    if(al.length===0)return;
    const fl=listFor(ck);
    const n=Math.max(1,Math.round(al.length*0.25));
    pickRand(al,n).forEach(it=>{
      const idx=fl.findIndex(x=>nameOf(ck,x)===nameOf(ck,it));
      aqPool.push({ck,idx,key:keyFor(ck,idx),name:nameOf(ck,it),info:infoOf(ck,it),item:it});
    });
  });
  shuffle(aqPool);
  aqIdx=0;aqAns={};aqCorrect=0;aqAnswered=false;
  aqCurrent=aqPool.length>0?aqPool[0]:null;
}

/* ━━━━━━ RENDER ━━━━━━ */
function render(){
  if(!proj)return;
  svgMap.innerHTML='';
  if(mode===4){renderOverview();return;}

  // Effective category + selection key for this render
  const effCat=mode===2&&aqCurrent?aqCurrent.ck:mode===3&&wiCurrent?wiCurrent.ck:catKey;
  const effSel=mode===2&&aqCurrent?aqCurrent.key:mode===3?null:selKey;
  const answered=mode===2?aqAns:mode===3?wiAns:mode===1?qAns:{};

  // 1) Seas — ALWAYS first so land covers them; only real water areas stay visible.
  //    pointer-events:none on base-land/base-nb lets clicks fall through to seas below.
  SEAS.forEach((s,i)=>{
    const ck='seas',key=keyFor(ck,i),a=answered[key];
    if(effCat===ck){
      const p=se('path',{d:ppath(s.g),class:'sea-play'+(effSel===key?' sel':'')+(a?' '+a:'')});
      if(mode===3)p.addEventListener('click',()=>onWiPick(ck,i));
      else if(mode!==2)p.addEventListener('click',()=>onPick(ck,i,seas[i]));
      svgMap.appendChild(p);
    }else{
      const p=se('path',{d:ppath(s.g),class:'sea-bg'});
      p.style.fill='var(--land)';
      svgMap.appendChild(p);
    }
  });

  // 2) Neighbour countries
  NB.forEach((f,i)=>{
    const ck='neighbours',key=keyFor(ck,i),active=effCat===ck;
    const p=se('path',{d:ppath(f.g)});
    if(active){
      const a=answered[key];
      p.setAttribute('class','region r-play'+(effSel===key?' sel':'')+(a?' '+a:''));
      if(!a)p.style.fill=NBC[f.n]||'#e8e4da';
      const dim=(mode===2||mode===3)&&!a&&effSel!==key;
      if(dim)p.style.opacity='.4';
      if(!isOn(ck,i)){p.style.opacity='.2';p.style.pointerEvents='none';}
      if(mode===3)p.addEventListener('click',()=>{if(isOn(ck,i))onWiPick(ck,i);});
      else if(mode!==2)p.addEventListener('click',()=>{if(isOn(ck,i))onPick(ck,i,f);});
    }else{
      p.setAttribute('class','region base-nb');
      // When seas active: full opacity so land covers sea correctly; no dimming
      if((mode===2||mode===3)&&effCat!=='seas')p.style.opacity='.6';
    }
    svgMap.appendChild(p);
  });

  // 3) States
  DE.forEach((f,i)=>{
    const ck='states',key=keyFor(ck,i),active=effCat===ck;
    const p=se('path',{d:ppath(f.g)});
    if(active){
      const a=answered[key];
      p.setAttribute('class','region r-play'+(effSel===key?' sel':'')+(a?' '+a:''));
      if(!a)p.style.fill=SC[i%16];
      const dim=(mode===2||mode===3)&&!a&&effSel!==key;
      if(dim)p.style.opacity='.35';
      if(!isOn(ck,i)){p.style.opacity='.15';p.style.pointerEvents='none';}
      if(mode===3)p.addEventListener('click',()=>{if(isOn(ck,i))onWiPick(ck,i);});
      else if(mode!==2)p.addEventListener('click',()=>{if(isOn(ck,i))onPick(ck,i,f);});
    }else{
      p.setAttribute('class','region base-land');
      p.style.fill=SC[i%16];
      // When seas active: full opacity so land covers sea correctly; no dimming
      if((mode===2||mode===3)&&effCat!=='seas')p.style.opacity='.55';
    }
    svgMap.appendChild(p);
  });

  // 4) Mountains
  const showMtn=effCat==='mountains'||mode===2||mode===3;
  if(showMtn){
    mountains.forEach((m,i)=>{
      if(!isOn('mountains',i))return;
      const key=keyFor('mountains',i),a=answered[key];
      const isSel=effSel===key,isAct=effCat==='mountains';
      const cls=(isAct?'geb':'geb-dim')+(isSel?' sel':'')+(a?' '+a:'');
      const el=se('path',{d:ptsp(m.pts),class:cls});
      if(isAct&&mode===3)el.addEventListener('click',()=>onWiPick('mountains',i));
      else if(isAct&&mode!==2)el.addEventListener('click',()=>onPick('mountains',i,m));
      svgMap.appendChild(el);
    });
  }

  // 5) Rivers
  const showRiv=effCat==='rivers'||mode===2||mode===3;
  if(showRiv){
    rivers.forEach((r,i)=>{
      if(!isOn('rivers',i))return;
      const key=keyFor('rivers',i),a=answered[key];
      const isSel=effSel===key,isAct=effCat==='rivers';
      const lineCls=(isAct?'rl':'rl-dim')+(isSel?' sel':'')+(a?' '+a:'');
      r.segs.forEach(seg=>{
        const pts=seg.map(p=>pp(p).map(v=>v.toFixed(1)).join(',')).join(' ');
        svgMap.appendChild(se('polyline',{points:pts,class:lineCls}));
        if(isAct&&mode===3){const hit=se('polyline',{points:pts,class:'hit'});hit.addEventListener('click',()=>onWiPick('rivers',i));svgMap.appendChild(hit);}
        else if(isAct&&mode!==2){const hit=se('polyline',{points:pts,class:'hit'});hit.addEventListener('click',()=>onPick('rivers',i,r));svgMap.appendChild(hit);}
      });
    });
  }

  // 6) Pins (cities/lakes/islands)
  const pinCats=(mode===2||mode===3)?['cities','lakes','islands']:[];
  if(pinCats.length===0&&['cities','lakes','islands'].includes(effCat))pinCats.push(effCat);
  [...new Set(pinCats)].forEach(ck=>{
    listFor(ck).forEach((m,i)=>{
      if(!isOn(ck,i))return;
      const key=keyFor(ck,i),isSel=effSel===key,a=answered[key];
      const isAct=effCat===ck;
      const c=pp([m.lon,m.lat]);
      const g=se('g',{class:'pin '+CAT[ck].cls+(isSel?' sel':'')+(a?' '+a:'')});
      if((mode===2||mode===3)&&!isAct)g.style.opacity='.4';
      g.appendChild(se('circle',{class:'ring',cx:c[0],cy:c[1],r:isSel?10:7}));
      g.appendChild(se('circle',{class:'core',cx:c[0],cy:c[1],r:3.2}));
      if(isAct&&mode===3)g.addEventListener('click',()=>onWiPick(ck,i));
      else if(isAct&&mode!==2)g.addEventListener('click',()=>onPick(ck,i,m));
      svgMap.appendChild(g);
    });
  });

  // 7) Labels (learn + toggle only)
  if(mode===0&&showLabels){
    if(effCat==='states')DE.forEach((f,i)=>{if(isOn('states',i)){const[x,y]=cen(f.g);svgMap.appendChild(stxt(x,y,f.n,'lbl'));}});
    else if(effCat==='neighbours')NB.forEach((f,i)=>{if(isOn('neighbours',i)){const[x,y]=cen(f.g);svgMap.appendChild(stxt(x,y,f.n,'lbl'));}});
    else if(effCat==='rivers')rivers.forEach((r,i)=>{if(isOn('rivers',i)){const seg=r.segs[0],c=pp(seg[Math.floor(seg.length/2)]);svgMap.appendChild(stxt(c[0],c[1],r.name,'lbl'));}});
    else if(effCat==='mountains')mountains.forEach((m,i)=>{if(isOn('mountains',i)){const pts=m.pts.map(proj);const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length,cy=pts.reduce((s,p)=>s+p[1],0)/pts.length;svgMap.appendChild(stxt(cx,cy+15,m.name,'lbl'));}});
    else if(effCat==='seas')seas.forEach((s,i)=>{if(isOn('seas',i)){const[x,y]=cen(s.g);svgMap.appendChild(stxt(x,y,s.name,'lbl-sea'));}});
    else listFor(effCat).forEach((m,i)=>{if(isOn(effCat,i)){const c=pp([m.lon,m.lat]);svgMap.appendChild(stxt(c[0]+10,c[1]+4,m.name,'lbl','start'));}});
  }
  compass();
}

/* ━━━━━━ OVERVIEW MAP (mode 3) ━━━━━━ */
function renderOverview(){
  SEAS.forEach(s=>{const p=se('path',{d:ppath(s.g),class:'sea-bg'});p.style.fill='var(--land)';svgMap.appendChild(p);});
  NB.forEach((f,i)=>{const p=se('path',{d:ppath(f.g),class:'region base-nb'});p.style.fill=NBC[f.n]||'#e8e4da';svgMap.appendChild(p);});
  DE.forEach((f,i)=>{const p=se('path',{d:ppath(f.g),class:'region base-land'});p.style.fill=SC[i%16];svgMap.appendChild(p);});
  // German border outline
  const dePathsStr=DE.map(f=>ppath(f.g)).join('');
  svgMap.appendChild(se('path',{d:dePathsStr,class:'de-border'}));
  mountains.forEach((m,i)=>{if(isOn('mountains',i))svgMap.appendChild(se('path',{d:ptsp(m.pts),class:'geb-ov'}));});
  rivers.forEach((r,i)=>{if(isOn('rivers',i))r.segs.forEach(seg=>{const pts=seg.map(p=>pp(p).map(v=>v.toFixed(1)).join(',')).join(' ');svgMap.appendChild(se('polyline',{points:pts,class:'rl-ov'}));});});
  cities.forEach((m,i)=>{if(isOn('cities',i)){const c=pp([m.lon,m.lat]);svgMap.appendChild(se('circle',{cx:c[0],cy:c[1],r:3,fill:'#c2762d'}));}});
  // Labels only if toggle is on
  if(showOvLabels){
    rivers.forEach((r,i)=>{if(isOn('rivers',i)){const seg=r.segs[0],c=pp(seg[Math.floor(seg.length/2)]);svgMap.appendChild(stxt(c[0],c[1]-3,r.name,'lbl'));}});
    mountains.forEach((m,i)=>{if(isOn('mountains',i)){const pts=m.pts.map(proj);const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length,cy=pts.reduce((s,p)=>s+p[1],0)/pts.length;svgMap.appendChild(stxt(cx,cy+14,m.name,'lbl'));}});
    cities.forEach((m,i)=>{if(isOn('cities',i)){const c=pp([m.lon,m.lat]);svgMap.appendChild(stxt(c[0]+8,c[1]-1,m.name,'lbl','start'));}});
  }
  compass();
}
function compass(){
  const ar=se('text',{x:578,y:30,class:'comp-a'});ar.textContent='▲';svgMap.appendChild(ar);
  const nn=se('text',{x:578,y:44,class:'comp-n'});nn.textContent='N';svgMap.appendChild(nn);
}

/* ━━━━━━ LERN INTERACTION ━━━━━━ */
function onPick(ck,i,item){
  const key=keyFor(ck,i),name=nameOf(ck,item),info=infoOf(ck,item);
  if(mode===0){
    selKey=key;render();
    showOv('<p class="ov-kicker">'+CAT[ck].label+'</p><p class="ov-name">'+name+'</p><p class="ov-info">'+(info||'')+'</p>');
    return;
  }
  if(mode!==1)return;
  if(qAns[key])return;
  if(!qPool.find(p=>p.key===key))return;
  selKey=key;render();
  const allNames=activeItems(ck).map(it=>nameOf(ck,it));
  const opts=[name];const pool2=allNames.filter(n=>n!==name);shuffle(pool2);
  while(opts.length<4&&pool2.length)opts.push(pool2.shift());
  shuffle(opts);
  let html='<p class="ov-kicker">'+CAT[ck].label+'</p><p class="ov-info" style="margin-bottom:8px">Wie heißt das markierte Element?</p><div class="opts">';
  opts.forEach(o=>{html+='<button class="opt" data-n="'+esc(o)+'">'+o+'</button>';});
  html+='</div>';
  showOv(html);
  document.querySelectorAll('.opt').forEach(b=>{b.onclick=()=>doLernAns(key,b.dataset.n,name,info);});
}
function doLernAns(key,chosen,correct,info){
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.dataset.n===correct)b.classList.add('correct');else if(b.dataset.n===chosen)b.classList.add('incorrect');});
  const ok=chosen===correct;
  qAns[key]=ok?'ok':'no';qDone++;if(ok)qCorrect++;
  updQ();selKey=null;render();
  document.querySelector('.opts').insertAdjacentHTML('afterend','<p class="result-hint">'+(ok?'✓ Richtig':'✗ Falsch – <b>'+correct+'</b>')+(info?' · '+info:'')+'</p>');
  if(qDone>=qPool.length)setTimeout(()=>{
    const pct=Math.round(qCorrect/qPool.length*100);
    showOv('<div class="done-box"><div class="done-e">'+(pct>=90?'🏆':pct>=70?'👏':pct>=50?'👍':'📚')+'</div><div class="done-s">'+qCorrect+' / '+qPool.length+'</div><div class="done-sub">'+pct+'% in „'+CAT[catKey].label+'"</div><button class="btn" id="rBtn">Nochmal</button></div>');
    document.getElementById('rBtn').onclick=()=>{initLernQuiz();closeOv();render();};
  },800);
}

/* ━━━━━━ ABFRAGE-QUIZ CARD ━━━━━━ */
function renderAqCard(){
  const bar=document.getElementById('aqBar');bar.style.display='flex';
  if(aqIdx>=aqPool.length){
    showAqSummary();return;
  }
  aqCurrent=aqPool[aqIdx];
  const{ck,name,info}=aqCurrent;
  // Update progress bar
  const pct=Math.round(aqIdx/aqPool.length*100);
  document.getElementById('aqFill').style.width=pct+'%';
  document.getElementById('aqCatLabel').textContent=CAT[ck].label;
  document.getElementById('aqProg').textContent='Frage '+(aqIdx+1)+' von '+aqPool.length;
  // Build options from same-category active items
  const activeNames=activeItems(ck).map(it=>nameOf(ck,it));
  const opts=[name];const pool2=activeNames.filter(n=>n!==name);shuffle(pool2);
  while(opts.length<4&&pool2.length)opts.push(pool2.shift());
  shuffle(opts);
  const card=document.getElementById('aqCard');
  card.innerHTML='<p class="ov-kicker">'+CAT[ck].label+'</p><p class="frage-q">Wie heißt das markierte Element?</p><div class="fopt-grid">'+opts.map(o=>'<button class="fopt-g" data-a="'+esc(o)+'">'+o+'</button>').join('')+'</div>';
  aqAnswered=false;
  render(); // draw spotlight
  card.querySelectorAll('.fopt-g').forEach(b=>{
    b.onclick=()=>{
      if(aqAnswered)return;aqAnswered=true;
      const ok=b.dataset.a===name;if(ok)aqCorrect++;
      aqAns[aqCurrent.key]=ok?'ok':'no';
      card.querySelectorAll('.fopt-g').forEach(x=>{x.disabled=true;if(x.dataset.a===name)x.classList.add('correct');else if(x.dataset.a===b.dataset.a)x.classList.add('incorrect');});
      render(); // update spotlight with ok/no
      const nav=document.createElement('div');nav.className='fnav';
      nav.innerHTML='<button class="pri" id="aqNext">'+(aqIdx+1<aqPool.length?'Nächste →':'Auswertung →')+'</button>';
      card.appendChild(nav);
      document.getElementById('aqNext').onclick=()=>{aqIdx++;renderAqCard();};
    };
  });
}
function showAqSummary(){
  document.getElementById('aqFill').style.width='100%';
  const pct=Math.round(aqCorrect/aqPool.length*100);
  document.getElementById('aqCard').innerHTML='<div class="done-box"><div class="done-e">'+(pct>=90?'🏆':pct>=70?'👏':pct>=50?'👍':'📚')+'</div><div class="done-s">'+aqCorrect+' / '+aqPool.length+' richtig</div><div class="done-sub">'+pct+'% aller Kategorien gemischt</div><button class="btn" id="aqRe">Neue Abfrage</button></div>';
  document.getElementById('aqProg').textContent='';
  aqCurrent=null;render();
  document.getElementById('aqRe').onclick=()=>{initAbfrage();renderAqCard();};
}

/* ━━━━━━ WO IST? (mode 3) ━━━━━━ */
function initWoIst(){
  wiPool=[];
  const al=activeItems(catKey),fl=listFor(catKey);
  al.forEach(it=>{
    const idx=fl.findIndex(x=>nameOf(catKey,x)===nameOf(catKey,it));
    wiPool.push({ck:catKey,idx,key:keyFor(catKey,idx),name:nameOf(catKey,it),info:infoOf(catKey,it),item:it});
  });
  shuffle(wiPool);
  wiIdx=0;wiAns={};wiCorrect=0;wiAnswered=false;
  wiCurrent=wiPool.length>0?wiPool[0]:null;
}
function renderWiCard(){
  if(wiIdx>=wiPool.length){showWiSummary();return;}
  wiCurrent=wiPool[wiIdx];
  wiAnswered=false;
  const card=document.getElementById('wiCard');
  card.innerHTML='<p class="ov-kicker">'+CAT[wiCurrent.ck].label+'</p><p class="frage-q">Tippe auf: <b>'+wiCurrent.name+'</b></p>'+(wiCurrent.info?'<p class="ov-info" style="margin:0">'+wiCurrent.info+'</p>':'');
  document.getElementById('wiProg').textContent='Frage '+(wiIdx+1)+' von '+wiPool.length;
  render();
}
function onWiPick(ck,i){
  if(mode!==3||!wiCurrent||wiAnswered)return;
  const key=keyFor(ck,i);
  const correct=key===wiCurrent.key;
  wiAnswered=true;
  wiAns[key]=correct?'ok':'no';
  if(correct)wiCorrect++;
  if(!correct)wiAns[wiCurrent.key]='ok';
  render();
  const card=document.getElementById('wiCard');
  const fb=document.createElement('p');fb.className='result-hint';
  if(correct)fb.innerHTML='✓ Richtig!';
  else fb.innerHTML='✗ Falsch – <b>'+wiCurrent.name+'</b> ist jetzt grün markiert.';
  card.appendChild(fb);
  const nav=document.createElement('div');nav.className='fnav';
  nav.innerHTML='<button class="pri" id="wiNext">'+(wiIdx+1<wiPool.length?'Nächste →':'Auswertung →')+'</button>';
  card.appendChild(nav);
  document.getElementById('wiNext').onclick=()=>{wiIdx++;renderWiCard();};
}
function showWiSummary(){
  const pct=wiPool.length>0?Math.round(wiCorrect/wiPool.length*100):0;
  document.getElementById('wiCard').innerHTML='<div class="done-box"><div class="done-e">'+(pct>=90?'🏆':pct>=70?'👏':pct>=50?'👍':'📚')+'</div><div class="done-s">'+wiCorrect+' / '+wiPool.length+' richtig</div><div class="done-sub">'+pct+'% in „'+CAT[catKey].label+'"</div><button class="btn" id="wiRe">Nochmal</button></div>';
  document.getElementById('wiProg').textContent='';
  wiCurrent=null;render();
  document.getElementById('wiRe').onclick=()=>{initWoIst();renderWiCard();};
}

/* ━━━━━━ FRAGEN (mode 4) ━━━━━━ */
const SLO={'Baden-Württemberg':9.2,'Bayern':11.6,'Berlin':13.4,'Brandenburg':13.5,'Bremen':8.8,'Hamburg':10.0,'Hessen':9.0,'Mecklenburg-Vorpommern':12.5,'Niedersachsen':9.4,'Nordrhein-Westfalen':7.4,'Rheinland-Pfalz':7.5,'Saarland':7.0,'Sachsen-Anhalt':11.5,'Sachsen':13.2,'Schleswig-Holstein':9.9,'Thüringen':11.1};
const SLA={'Baden-Württemberg':48.5,'Bayern':48.5,'Berlin':52.5,'Brandenburg':52.3,'Bremen':53.1,'Hamburg':53.6,'Hessen':50.6,'Mecklenburg-Vorpommern':53.8,'Niedersachsen':52.5,'Nordrhein-Westfalen':51.5,'Rheinland-Pfalz':50.0,'Saarland':49.4,'Sachsen-Anhalt':51.9,'Sachsen':51.0,'Schleswig-Holstein':54.2,'Thüringen':50.9};

function buildFragen(){
  // Use only ACTIVE items from each category
  const aR=rivers.filter((_,i)=>isOn('rivers',i));
  const aM=mountains.filter((_,i)=>isOn('mountains',i));
  const aL=lakes.filter((_,i)=>isOn('lakes',i));
  const aC=cities.filter((_,i)=>isOn('cities',i));
  const aN=NB.filter((_,i)=>isOn('neighbours',i));
  const aS=DE.filter((_,i)=>isOn('states',i));
  const aI=islands.filter((_,i)=>isOn('islands',i));
  const aq=[];
  const rNames=aR.map(r=>r.name),mNames=aM.map(m=>m.name),lNames=aL.map(l=>l.name),cNames=aC.map(c=>c.name),nNames=aN.map(f=>f.n),sNames=aS.map(f=>f.n);
  const rnd=(arr,n)=>shuffle([...arr]).slice(0,n);
  const wo=(arr,exc)=>arr.filter(x=>x!==exc);
  // Rätselfragen aus info-Texten
  aR.forEach(r=>{const w=rnd(wo(rNames,r.name),3);if(w.length>0)aq.push({type:'r',q:'Welcher Fluss? „'+r.info+'"',ans:r.name,opts:shuffle([r.name,...w])});});
  aM.forEach(m=>{const w=rnd(wo(mNames,m.name),3);if(w.length>0)aq.push({type:'r',q:'Welches Gebirge? „'+m.info+'"',ans:m.name,opts:shuffle([m.name,...w])});});
  aL.forEach(l=>{const w=rnd(wo(lNames,l.name),3);if(w.length>0)aq.push({type:'r',q:'Welcher See? „'+l.info+'"',ans:l.name,opts:shuffle([l.name,...w])});});
  // Lagefragen Bundesländer
  if(sNames.length>=4){
    const byLon=[...aS].sort((a,b)=>SLO[a.n]-SLO[b.n]);
    const byLat=[...aS].sort((a,b)=>SLA[b.n]-SLA[a.n]);
    [{q:'Welches dieser Bundesländer liegt am weitesten im Westen?',ans:byLon[0].n},{q:'Welches dieser Bundesländer liegt am weitesten im Osten?',ans:byLon[byLon.length-1].n},{q:'Welches dieser Bundesländer liegt am weitesten im Norden?',ans:byLat[0].n},{q:'Welches dieser Bundesländer grenzt direkt an die Alpen?',ans:'Bayern'}]
    .filter(d=>sNames.includes(d.ans)).forEach(d=>{const w=rnd(wo(sNames,d.ans),3);if(w.length>0)aq.push({type:'l',q:d.q,ans:d.ans,opts:shuffle([d.ans,...w])});});
  }
  // Nachbarland-Lage
  if(nNames.length>=2){
    [{q:'Welches Nachbarland liegt direkt östlich von Deutschland an der Ostsee?',ans:'Polen'},{q:'Welches Nachbarland liegt südlich der Alpen, östlich der Schweiz?',ans:'Österreich'},{q:'Welches Nachbarland liegt nördlich von Deutschland?',ans:'Dänemark'},{q:'Welches Nachbarland liegt westlich und hat Amsterdam als Hauptstadt?',ans:'Niederlande'},{q:'Welches kleine Nachbarland liegt zwischen Frankreich und Deutschland im Südwesten?',ans:'Luxemburg'}]
    .filter(d=>nNames.includes(d.ans)).forEach(d=>{const all=[...nNames];const w=rnd(wo(all,d.ans),3);if(w.length>0)aq.push({type:'l',q:d.q,ans:d.ans,opts:shuffle([d.ans,...w])});});
  }
  // Stadt-Fluss Zuordnung
  [{city:'Köln',river:'Rhein'},{city:'Frankfurt am Main',river:'Main'},{city:'Dresden',river:'Elbe'},{city:'Bremen',river:'Weser'},{city:'Berlin',river:'Spree'}]
  .filter(cr=>cNames.includes(cr.city)&&rNames.includes(cr.river))
  .forEach(cr=>{const w=rnd(wo(rNames,cr.river),3);if(w.length>0)aq.push({type:'r',q:'An welchem Fluss liegt '+cr.city+'?',ans:cr.river,opts:shuffle([cr.river,...w])});});
  // Hauptstädte
  [{bl:'Bayern',hs:'München'},{bl:'Sachsen',hs:'Dresden'},{bl:'Thüringen',hs:'Erfurt'},{bl:'Brandenburg',hs:'Potsdam'},{bl:'Niedersachsen',hs:'Hannover'},{bl:'Nordrhein-Westfalen',hs:'Düsseldorf'},{bl:'Baden-Württemberg',hs:'Stuttgart'},{bl:'Sachsen-Anhalt',hs:'Magdeburg'}]
  .filter(c=>sNames.includes(c.bl)&&cNames.includes(c.hs))
  .forEach(c=>{const w=rnd(wo(cNames,c.hs),3);if(w.length>0)aq.push({type:'r',q:'Was ist die Hauptstadt von '+c.bl+'?',ans:c.hs,opts:shuffle([c.hs,...w])});});
  // Meer-Fragen (nur wenn Meere/Inseln aktiv)
  const aSeas=seas.filter((_,i)=>isOn('seas',i));const seaNames=aSeas.map(s=>s.name);
  if(seaNames.includes('Ostsee')&&aI.some(isl=>isl.name==='Rügen'))
    aq.push({type:'l',q:'An welchem Meer liegt Rügen?',ans:'Ostsee',opts:shuffle(['Ostsee','Nordsee','Atlantik','Mittelmeer'])});
  if(seaNames.includes('Nordsee'))
    aq.push({type:'l',q:'In welchem Meer befindet sich das Wattenmeer?',ans:'Nordsee',opts:shuffle(['Nordsee','Ostsee','Atlantik','Mittelmeer'])});
  shuffle(aq);
  fList=aq.slice(0,12);fIdx=0;fScore=0;fAnswered=false;
}
function renderFrage(){
  const card=document.getElementById('frageCard'),prog=document.getElementById('fprog');
  if(fIdx>=fList.length){
    const pct=Math.round(fScore/fList.length*100);
    card.innerHTML='<div class="done-box"><div class="done-e">'+(pct>=80?'🏆':pct>=60?'👏':'📚')+'</div><div class="done-s">'+fScore+' / '+fList.length+'</div><div class="done-sub">'+pct+'% der Fragen richtig</div><button class="btn" id="fRe">Neue Fragen</button></div>';
    prog.textContent='';
    document.getElementById('fRe').onclick=()=>{buildFragen();renderFrage();};return;
  }
  const f=fList[fIdx];
  card.innerHTML='<span class="tag '+(f.type==='r'?'r':'l')+'">'+(f.type==='r'?'Rätselfrage':'Lagefrage')+'</span><p class="frage-q">'+f.q+'</p><div class="frage-opts-col">'+f.opts.map(o=>'<button class="fopt" data-a="'+esc(o)+'">'+o+'</button>').join('')+'</div>';
  prog.textContent='Frage '+(fIdx+1)+' von '+fList.length;
  fAnswered=false;
  card.querySelectorAll('.fopt').forEach(b=>{
    b.onclick=()=>{
      if(fAnswered)return;fAnswered=true;const ok=b.dataset.a===f.ans;if(ok)fScore++;
      card.querySelectorAll('.fopt').forEach(x=>{x.disabled=true;if(x.dataset.a===f.ans)x.classList.add('correct');else if(x.dataset.a===b.dataset.a)x.classList.add('incorrect');});
      const nav=document.createElement('div');nav.className='fnav';
      nav.innerHTML='<button class="pri" id="fNext">'+(fIdx+1<fList.length?'Nächste →':'Auswertung →')+'</button>';
      card.appendChild(nav);document.getElementById('fNext').onclick=()=>{fIdx++;renderFrage();};
    };
  });
}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/'/g,'&#39;');}

/* ━━━━━━ INIT ━━━━━━ */
buildProj(DE.concat(NB)); // SEAS excluded: extent only from real land data
document.getElementById('learnCtrl').style.display='flex';
render();
</script>

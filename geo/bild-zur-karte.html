<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e9ece4">
<title>Vom Bild zur Karte</title>
<style>
:root{--paper:#e9ece4;--paper-2:#f3f5ef;--ink:#26302e;--ink-soft:#5d6764;--line:#c4ccc1;--amber:#c2762d;--right:#3f8f5b;--wrong:#bd5239;--shadow:0 2px 12px rgba(38,48,46,.10);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,system-ui,"Segoe UI",sans-serif;line-height:1.4;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);-webkit-text-size-adjust:100%;}
.wrap{max-width:560px;margin:0 auto;padding:13px 13px 36px;}
.eyebrow{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--amber);font-weight:700;margin:0 0 1px;}
h1{font-family:Georgia,serif;font-weight:600;font-size:25px;line-height:1.05;margin:0;}
.lede{color:var(--ink-soft);font-size:12px;margin:2px 0 0;}
.mode-bar{display:flex;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:3px;margin:11px 0 7px;gap:3px;}
.mbtn{flex:1;border:0;background:transparent;color:var(--ink-soft);font-size:11px;font-weight:600;padding:8px 4px;border-radius:8px;cursor:pointer;font-family:inherit;transition:.12s;text-align:center;line-height:1.2;}
.mbtn[aria-pressed="true"]{background:var(--ink);color:var(--paper-2);}
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:8px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin:0 0 6px;}
.card-desc{font-size:13px;color:var(--ink-soft);margin:0 0 10px;line-height:1.5;}
.info-box{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:8px;}
.info-box h3{font-size:13px;margin:0 0 5px;}
.info-box p{font-size:12px;color:var(--ink-soft);margin:3px 0;line-height:1.5;}
.quiz-card{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:8px;box-shadow:var(--shadow);}
.quiz-q{font-size:14px;font-weight:600;margin:0 0 10px;line-height:1.4;}
.btn{width:100%;margin-top:10px;border:0;background:var(--ink);color:var(--paper-2);font-size:14px;font-weight:700;font-family:inherit;padding:12px;border-radius:12px;cursor:pointer;}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-row .btn{flex:1;}
.scorebar{display:flex;gap:7px;margin-top:9px;}
.stat{flex:1;background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:7px 10px;text-align:center;}
.stat b{display:block;font-family:Georgia,serif;font-size:18px;line-height:1;}
.stat small{font-size:10px;color:var(--ink-soft);}
.done-box{text-align:center;padding:12px 0;}
.done-e{font-size:30px;margin:0 0 4px;}
.done-s{font-family:Georgia,serif;font-size:20px;font-weight:600;margin:3px 0;}
.done-sub{color:var(--ink-soft);font-size:13px;margin:2px 0 12px;}
canvas{display:block;width:100%;height:auto;border-radius:10px;}
.fopt{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:14px;font-weight:600;font-family:inherit;padding:12px 13px;border-radius:11px;cursor:pointer;text-align:left;transition:.1s;width:100%;margin-bottom:7px;}
.fopt.correct{background:var(--right);border-color:var(--right);color:#fff;}
.fopt.incorrect{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.fopt:disabled{cursor:default;}
.result-hint{font-size:13px;color:var(--ink-soft);margin:10px 0 0;text-align:center;}
.toggle-row{display:flex;align-items:center;justify-content:flex-end;gap:7px;margin:0 0 2px;}
.toggle-row label{font-size:11px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
.toggle-sw{position:relative;width:36px;height:20px;background:var(--line);border-radius:10px;cursor:pointer;border:0;padding:0;transition:.2s;}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;}
.toggle-sw.on{background:var(--amber);}
.toggle-sw.on::after{left:18px;}
.swatch{width:60px;height:60px;border-radius:10px;margin:0 auto 12px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:28px;}
.legend-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
.legend-swatch{width:28px;height:28px;border-radius:6px;border:1px solid var(--line);flex-shrink:0;}
.legend-text{font-size:12px;line-height:1.3;}
.legend-text b{display:block;font-size:13px;}
.route-opt{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:13px;font-family:inherit;padding:11px 13px;border-radius:11px;cursor:pointer;text-align:left;transition:.1s;width:100%;margin-bottom:7px;line-height:1.5;}
.route-opt.correct{background:rgba(63,143,91,.1);border-color:var(--right);color:var(--right);}
.route-opt.incorrect{background:rgba(189,82,57,.1);border-color:var(--wrong);color:var(--wrong);}
.route-opt:disabled{cursor:default;}
.cross-btn{border:2px solid var(--line);background:var(--paper);color:var(--ink);font-size:12px;font-weight:600;font-family:inherit;padding:8px 10px;border-radius:10px;cursor:pointer;transition:.12s;text-align:center;flex:1;line-height:1.3;}
.cross-btn.correct{border-color:var(--right);background:rgba(63,143,91,.1);color:var(--right);}
.cross-btn.incorrect{border-color:var(--wrong);background:rgba(189,82,57,.1);color:var(--wrong);}
.cross-btn:disabled{cursor:default;}
@media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <p class="eyebrow">Atlas · Übung</p>
  <h1>Vom Bild zur Karte</h1>
  <p class="lede">Lerne, wie aus Luftbildern Karten entstehen.</p>
</header>
<div class="mode-bar" role="group">
  <button class="mbtn" id="m0" aria-pressed="true">Lernen</button>
  <button class="mbtn" id="m1" aria-pressed="false">Symbole</button>
  <button class="mbtn" id="m2" aria-pressed="false">Planquadrat</button>
  <button class="mbtn" id="m3" aria-pressed="false">Wege</button>
  <button class="mbtn" id="m4" aria-pressed="false">Luftbild</button>
</div>
<div class="toggle-row">
  <label for="advToggle">Advanced</label>
  <button class="toggle-sw" id="advToggle" role="switch" aria-checked="false"></button>
</div>
<div id="content"></div>
</div>
<script>
/* ━━━━━━ STATE ━━━━━━ */
let mode=0,quizScore=0,quizRound=0,learnIdx=0,advanced=false;
const MAX_ROUNDS=6;
const contentEl=document.getElementById('content');
let rngSeed=Date.now()%100000;
function rng(){rngSeed=(rngSeed*16807)%2147483647;return rngSeed/2147483647;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ━━━━━━ DATA ━━━━━━ */
const MAP_COLORS=[
  {id:'gruen',color:'#90c97a',label:'Hellgrün',name:'Grünfläche',desc:'Parks, Wiesen, Gärten'},
  {id:'rot',color:'#d45b5b',label:'Rot',name:'Öffentliche Gebäude',desc:'Rathaus, Schule, Feuerwehr'},
  {id:'rosa',color:'#e8a0b0',label:'Rosa',name:'Privathäuser',desc:'Wohngebäude'},
  {id:'grau',color:'#d4d4d4',label:'Grau-weiß',name:'Plätze und Straßen',desc:'Wege und Plätze'},
  {id:'blau',color:'#7ec8e3',label:'Hellblau',name:'Wasser',desc:'Brunnen, Seen, Flüsse'},
  {id:'dgruen',color:'#3a7d4a',label:'Dunkelgrün',name:'Läden / Büchereien',desc:'Geschäfte'},
];
const MAP_SYMBOLS=[
  {id:'kreuz',symbol:'†',name:'Kirche / Denkmal',desc:'Religiöse Gebäude und Denkmäler'},
  {id:'kreis',symbol:'○',name:'Brunnen',desc:'Wasserstellen und Brunnen'},
  {id:'see',symbol:'●',name:'See / Teich',desc:'Gewässer',color:'#7ec8e3'},
];

const LANDMARKS_POOL=[
  {name:'Kirche',symbol:'†',abbr:'K',colorId:'rot'},
  {name:'Rathaus',symbol:'R',abbr:'R',colorId:'rot'},
  {name:'Schule',symbol:'S',abbr:'S',colorId:'rot'},
  {name:'Park',symbol:null,abbr:'P',colorId:'gruen'},
  {name:'See',symbol:null,abbr:'Se',colorId:'blau'},
  {name:'Brunnen',symbol:'○',abbr:'Br',colorId:'blau'},
  {name:'Bücherei',symbol:'B',abbr:'Bü',colorId:'dgruen'},
  {name:'Spielplatz',symbol:null,abbr:'Sp',colorId:'gruen'},
  {name:'Supermarkt',symbol:null,abbr:'Su',colorId:'dgruen'},
  {name:'Denkmal',symbol:'†',abbr:'D',colorId:'grau'},
  {name:'Feuerwehr',symbol:'F',abbr:'Fw',colorId:'rot'},
  {name:'Gymnasium',symbol:null,abbr:'Gy',colorId:'rot'},
];


/* ━━━━━━ TOGGLE & MODES ━━━━━━ */
const advBtn=document.getElementById('advToggle');
advBtn.onclick=()=>{advanced=!advanced;advBtn.classList.toggle('on',advanced);advBtn.setAttribute('aria-checked',advanced);rerender();};
function rerender(){
  if(mode===0)renderLearn();
  else if(mode===1){resetQuiz();renderSymbole();}
  else if(mode===2){resetQuiz();renderPlanquadrat();}
  else if(mode===3){resetQuiz();renderWeg();}
  else{resetQuiz();renderLuftbild();}
}
function resetQuiz(){quizScore=0;quizRound=0;rngSeed=Date.now()%100000;}
[0,1,2,3,4].forEach(i=>document.getElementById('m'+i).onclick=()=>setMode(i));
function setMode(m){
  mode=m;
  [0,1,2,3,4].forEach(j=>document.getElementById('m'+j).setAttribute('aria-pressed',j===m));
  if(m===0)renderLearn();
  else if(m===1){resetQuiz();renderSymbole();}
  else if(m===2){resetQuiz();renderPlanquadrat();}
  else if(m===3){resetQuiz();renderWeg();}
  else{resetQuiz();renderLuftbild();}
}

/* ━━━━━━ LEARN MODE ━━━━━━ */
function renderLearn(){
  if(learnIdx===0)renderLearnPage0();
  else if(learnIdx===1)renderLearnPage1();
  else if(learnIdx===2)renderLearnPage2();
  else renderLearnPage3();
}

function learnNav(html){
  html+='<div class="btn-row"><button class="btn" id="prevL">←</button><button class="btn" id="nextL">Weiter →</button></div>';
  contentEl.innerHTML=html;
  document.getElementById('prevL').onclick=()=>{learnIdx=(learnIdx+3)%4;renderLearn();};
  document.getElementById('nextL').onclick=()=>{learnIdx=(learnIdx+1)%4;renderLearn();};
}

function renderLearnPage0(){
  let h='<div class="card"><div class="card-title">Vom Bild zur Karte</div>';
  h+='<div class="card-desc" style="font-size:14px;line-height:1.7;">';
  h+='<p style="margin:0 0 8px;">Karten sind ein wichtiges Hilfsmittel, um sich zu orientieren.</p>';
  h+='<p style="margin:0 0 8px;">Sie bilden die Oberfläche der Erde ab. Auf einer Karte kann die Oberfläche nur <b>vereinfacht</b> dargestellt werden.</p>';
  h+='<p style="margin:0 0 8px;">Karten entstehen mithilfe von <b>Luftbildern</b>, die aus großer Höhe von Satelliten aufgenommen werden.</p>';
  h+='<p style="margin:0;">Die Bilder werden dann von <b>Kartographen</b> (Kartenzeichnern) genutzt, um Karten zu erstellen.</p>';
  h+='</div></div>';
  h+='<div class="info-box"><h3>Vereinfachungen auf der Karte:</h3>';
  h+='<p>• Einzelne Bäume und Büsche werden weggelassen</p>';
  h+='<p>• Gebäude werden als einfache Formen dargestellt</p>';
  h+='<p>• Farben und Symbole ersetzen die echten Bilder</p>';
  h+='<p>• Straßen werden als Linien gezeichnet</p></div>';
  learnNav(h);
}

function renderLearnPage1(){
  let h='<div class="card"><div class="card-title">Farben & Symbole</div>';
  h+='<div class="card-desc">Auf Stadtkarten bedeuten die Farben:</div>';
  MAP_COLORS.forEach(c=>{
    h+='<div class="legend-row"><div class="legend-swatch" style="background:'+c.color+'"></div>';
    h+='<div class="legend-text"><b>'+c.label+' = '+c.name+'</b>'+c.desc+'</div></div>';
  });
  h+='<div class="card-desc" style="margin-top:12px;">Symbole auf Karten:</div>';
  MAP_SYMBOLS.forEach(s=>{
    h+='<div class="legend-row"><div class="legend-swatch" style="background:'+(s.color||'#f9f7f1')+';display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;">'+s.symbol+'</div>';
    h+='<div class="legend-text"><b>'+s.symbol+' = '+s.name+'</b>'+s.desc+'</div></div>';
  });
  h+='</div>';
  learnNav(h);
}

function renderLearnPage2(){
  let h='<div class="card"><div class="card-title">Planquadrate</div>';
  h+='<div class="card-desc" style="font-size:14px;line-height:1.7;">';
  h+='<p style="margin:0 0 8px;">Um Orte auf einer Karte schnell zu finden, wird ein <b>Gitternetz</b> über die Karte gelegt.</p>';
  h+='<p style="margin:0 0 8px;">Die Zeilen werden mit <b>Buchstaben</b> (A, B, C, D …) bezeichnet, die Spalten mit <b>Zahlen</b> (1, 2, 3, 4 …).</p>';
  h+='<p style="margin:0;">Jedes Feld heißt <b>Planquadrat</b>. Beispiel: „Die Kirche liegt in <b>B3</b>" (Zeile B, Spalte 3).</p>';
  h+='</div>';
  h+='<p style="font-size:11px;color:var(--ink-soft);margin:8px 0 4px;text-align:center;">Tippe auf ein Feld:</p>';
  h+='<canvas id="cGrid" style="cursor:pointer;"></canvas>';
  h+='<p id="gridFb" style="font-size:14px;font-weight:600;text-align:center;margin:8px 0 0;color:var(--amber);min-height:20px;"></p>';
  h+='</div>';
  learnNav(h);
  drawInteractiveGrid();
}

function renderLearnPage3(){
  let h='<div class="card"><div class="card-title">Wegbeschreibung</div>';
  h+='<div class="card-desc" style="font-size:14px;line-height:1.7;">';
  h+='<p style="margin:0 0 8px;">Eine <b>Wegbeschreibung</b> erklärt, wie man von einem Ort zum anderen kommt.</p>';
  h+='<p style="margin:0 0 8px;">Dabei benutzt man <b>Straßennamen</b>, <b>Richtungen</b> und <b>Orientierungspunkte</b>.</p>';
  h+='</div>';
  h+='<canvas id="cWegEx"></canvas>';
  h+='<div class="info-box" style="margin-top:8px;"><h3>Wichtige Wörter:</h3>';
  h+='<p>• <b>links abbiegen</b> — nach links gehen</p>';
  h+='<p>• <b>rechts abbiegen</b> — nach rechts gehen</p>';
  h+='<p>• <b>geradeaus</b> — weiter gerade</p>';
  h+='<p>• <b>entlang</b> — der Straße folgen</p>';
  h+='<p>• <b>vorbei an</b> — an einem Ort vorbeigehen</p>';
  h+='<p>• <b>bis zur</b> — bis man etwas erreicht</p></div>';
  h+='</div>';
  learnNav(h);
  drawWegExample();
}

/* ━━━━━━ INTERACTIVE GRID (Learn page 2) ━━━━━━ */
function drawInteractiveGrid(){
  const c=document.getElementById('cGrid');
  const W=300,H=300;c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  const pad=30,cols=4,rows=4;
  const cw=(W-pad*2)/cols,ch=(H-pad*2)/rows;

  function draw(highlight){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#f9f7f1';ctx.fillRect(0,0,W,H);
    for(let r=0;r<rows;r++)for(let col=0;col<cols;col++){
      const x=pad+col*cw,y=pad+r*ch;
      ctx.fillStyle=(highlight&&highlight.r===r&&highlight.c===col)?'rgba(194,118,45,.2)':'rgba(255,255,255,.5)';
      ctx.fillRect(x+1,y+1,cw-2,ch-2);
      ctx.strokeStyle='var(--line)';ctx.lineWidth=1;
      ctx.strokeRect(x,y,cw,ch);
    }
    ctx.font='bold 14px -apple-system,sans-serif';ctx.fillStyle='#555';ctx.textAlign='center';ctx.textBaseline='middle';
    for(let r=0;r<rows;r++)ctx.fillText(String.fromCharCode(65+r),pad/2,pad+r*ch+ch/2);
    for(let col=0;col<cols;col++)ctx.fillText(''+(col+1),pad+col*cw+cw/2,pad/2);
  }
  draw(null);

  c.onclick=function(e){
    const rect=c.getBoundingClientRect();
    const sx=W/rect.width,sy=H/rect.height;
    const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
    const col=Math.floor((mx-pad)/cw),row=Math.floor((my-pad)/ch);
    if(col<0||col>=cols||row<0||row>=rows)return;
    draw({r:row,c:col});
    document.getElementById('gridFb').textContent='Du hast '+String.fromCharCode(65+row)+(col+1)+' getippt!';
  };
}

/* ━━━━━━ WEG EXAMPLE (Learn page 3) ━━━━━━ */
function drawWegExample(){
  const c=document.getElementById('cWegEx');
  const mapData=WEGE_MAPS[0];
  drawGraphStreetMap(c,mapData,[0,1,4,8,9],true);
}

/* ━━━━━━ SYMBOLE QUIZ ━━━━━━ */
function renderSymbole(){
  if(quizRound>=MAX_ROUNDS){renderDone(()=>{resetQuiz();renderSymbole();});return;}

  const pool=[...MAP_COLORS,...MAP_SYMBOLS];
  shuffle(pool);
  const item=pool[quizRound%pool.length];
  const isColor=!!item.color&&!item.symbol;
  const isSymbol=!!item.symbol;

  // Build 4 options
  const correct=item.name;
  const others=pool.filter(p=>p.name!==correct).map(p=>p.name);
  shuffle(others);
  const opts=shuffle([correct,...others.slice(0,3)]);

  let html='<div class="quiz-card"><div class="card-title">Frage '+(quizRound+1)+' / '+MAX_ROUNDS+'</div>';
  if(isSymbol){
    html+='<div class="quiz-q">Was bedeutet dieses Kartenzeichen?</div>';
    html+='<div class="swatch" style="background:'+(item.color||'#f9f7f1')+';">'+item.symbol+'</div>';
  } else {
    html+='<div class="quiz-q">Welche Bedeutung hat diese Kartenfarbe?</div>';
    html+='<div class="swatch" style="background:'+item.color+';"></div>';
  }
  opts.forEach(o=>{html+='<button class="fopt" data-a="'+o+'">'+o+'</button>';});
  html+='<div id="sFb"></div></div>';
  html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
  contentEl.innerHTML=html;

  contentEl.querySelectorAll('.fopt').forEach(b=>{
    b.onclick=()=>{
      contentEl.querySelectorAll('.fopt').forEach(x=>{x.disabled=true;if(x.dataset.a===correct)x.classList.add('correct');else if(x===b&&b.dataset.a!==correct)x.classList.add('incorrect');});
      if(b.dataset.a===correct)quizScore++;
      quizRound++;
      document.getElementById('sc').textContent=quizScore;
      document.getElementById('sFb').innerHTML='<p class="result-hint">'+(b.dataset.a===correct?'✓ Richtig!':'✗ Richtig wäre: <b>'+correct+'</b>')+'</p><button class="btn" id="sNx">Weiter →</button>';
      document.getElementById('sNx').onclick=renderSymbole;
    };
  });
}

/* ━━━━━━ PLANQUADRAT QUIZ ━━━━━━ */
function generateCity(seed){
  let s=seed;const lr=()=>{s=(s*16807)%2147483647;return s/2147483647;};
  const size=advanced?5:4;
  const letters='ABCDEFGH'.slice(0,size);
  const count=advanced?10:8;
  const lmPool=shuffle([...LANDMARKS_POOL]).slice(0,count);
  const placed=[];
  // Allow multiple landmarks per cell — spread them but don't enforce uniqueness
  lmPool.forEach(lm=>{
    const r=Math.floor(lr()*size),c=Math.floor(lr()*size);
    placed.push({...lm,row:r,col:c});
  });

  // Assign block types to cells (based on dominant landmark or random)
  const cells=[];
  const blockTypes=['rosa','rosa','rosa','gruen','grau','rosa'];
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    const lms=placed.filter(l=>l.row===r&&l.col===c);
    if(lms.length>0){
      cells.push({row:r,col:c,colorId:lms[0].colorId,landmarks:lms});
    }else{
      const bt=blockTypes[Math.floor(lr()*blockTypes.length)];
      cells.push({row:r,col:c,colorId:bt,landmarks:[]});
    }
  }
  return {size,letters,placed,cells};
}

function drawPlanquadratMap(canvas,city,highlight){
  const W=300,H=300;canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const pad=28,size=city.size;
  const cw=(W-pad*2)/size,ch=(H-pad*2)/size;

  ctx.fillStyle='#f9f7f1';ctx.fillRect(0,0,W,H);

  // Draw cells
  city.cells.forEach(cell=>{
    const x=pad+cell.col*cw,y=pad+cell.row*ch;
    const mc=MAP_COLORS.find(c=>c.id===cell.colorId);
    ctx.fillStyle=mc?mc.color:'#e8c8b0';
    ctx.fillRect(x+2,y+2,cw-4,ch-4);

    // Building outlines for rosa/rot
    if(cell.colorId==='rosa'||cell.colorId==='rot'){
      ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1;
      ctx.strokeRect(x+6,y+6,cw-12,ch-12);
      if(cw>50){ctx.strokeRect(x+8,y+Math.floor(ch/2),cw-16,ch/2-8);}
    }
    // Trees for green
    if(cell.colorId==='gruen'){
      for(let t=0;t<4;t++){
        const tx=x+10+(t%2)*(cw-24),ty=y+10+Math.floor(t/2)*(ch-24);
        ctx.beginPath();ctx.arc(tx,ty,5,0,Math.PI*2);ctx.fillStyle='#5a9e4a';ctx.fill();
      }
    }
    // Water pattern for blue
    if(cell.colorId==='blau'){
      ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
      for(let w=0;w<3;w++){
        const wy=y+10+w*12;
        ctx.beginPath();ctx.moveTo(x+8,wy);ctx.quadraticCurveTo(x+cw/2,wy-4,x+cw-8,wy);ctx.stroke();
      }
    }
  });

  // Highlight cell if specified
  if(highlight){
    const x=pad+highlight.col*cw,y=pad+highlight.row*ch;
    ctx.strokeStyle='#c2762d';ctx.lineWidth=3;ctx.setLineDash([5,3]);
    ctx.strokeRect(x,y,cw,ch);ctx.setLineDash([]);
  }

  // Grid lines
  ctx.strokeStyle='#999';ctx.lineWidth=1;
  for(let r=0;r<=size;r++){ctx.beginPath();ctx.moveTo(pad,pad+r*ch);ctx.lineTo(W-pad,pad+r*ch);ctx.stroke();}
  for(let c=0;c<=size;c++){ctx.beginPath();ctx.moveTo(pad+c*cw,pad);ctx.lineTo(pad+c*cw,H-pad);ctx.stroke();}

  // Labels
  ctx.font='bold 13px -apple-system,sans-serif';ctx.fillStyle='#555';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let r=0;r<size;r++)ctx.fillText(city.letters[r],pad/2,pad+r*ch+ch/2);
  for(let c=0;c<size;c++)ctx.fillText(''+(c+1),pad+c*cw+cw/2,pad/2);

  // Landmark labels — position multiple per cell without overlap
  ctx.font='bold 10px -apple-system,sans-serif';
  city.cells.forEach(cell=>{
    const lms=cell.landmarks;
    if(!lms||lms.length===0)return;
    const cx=pad+cell.col*cw,cy=pad+cell.row*ch;
    // Offset positions within cell for 1, 2, or 3+ landmarks
    const positions=lms.length===1?
      [{dx:cw/2,dy:ch/2}]:
      lms.length===2?
      [{dx:cw*0.33,dy:ch*0.4},{dx:cw*0.67,dy:ch*0.65}]:
      lms.map((_,i)=>({dx:cw*(0.25+0.25*(i%2)),dy:ch*(0.25+0.25*Math.floor(i/2))}));
    lms.forEach((lm,i)=>{
      const pos=positions[Math.min(i,positions.length-1)];
      const x=cx+pos.dx,y=cy+pos.dy;
      ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.beginPath();ctx.arc(x,y,11,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#333';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(lm.abbr,x,y);
    });
  });
}

function renderPlanquadrat(){
  if(quizRound>=MAX_ROUNDS){renderDone(()=>{resetQuiz();renderPlanquadrat();});return;}

  const city=generateCity(rngSeed+quizRound*777);
  // Three question types: A=where is X, B=what is in cell, C=what is NOT in cell
  const qType=quizRound%3;

  let html='<div class="quiz-card"><div class="card-title">Frage '+(quizRound+1)+' / '+MAX_ROUNDS+'</div>';

  if(qType===0){
    // Type A: "In welchem Planquadrat liegt X?"
    const target=city.placed[Math.floor(rng()*city.placed.length)];
    const correctRef=city.letters[target.row]+(target.col+1);
    html+='<div class="quiz-q">In welchem Planquadrat liegt <b>'+target.name+'</b> ('+target.abbr+')?</div>';
    html+='<canvas id="cPQ"></canvas>';
    const allRefs=[];
    for(let r=0;r<city.size;r++)for(let c=0;c<city.size;c++)allRefs.push(city.letters[r]+(c+1));
    const wrong=allRefs.filter(r=>r!==correctRef);
    shuffle(wrong);
    const opts=shuffle([correctRef,...wrong.slice(0,3)]);
    opts.forEach(o=>{html+='<button class="fopt" data-a="'+o+'">'+o+'</button>';});
    html+='<div id="pqFb"></div></div>';
    html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
    contentEl.innerHTML=html;
    drawPlanquadratMap(document.getElementById('cPQ'),city,null);

    contentEl.querySelectorAll('.fopt').forEach(b=>{
      b.onclick=()=>{
        contentEl.querySelectorAll('.fopt').forEach(x=>{x.disabled=true;if(x.dataset.a===correctRef)x.classList.add('correct');else if(x===b&&b.dataset.a!==correctRef)x.classList.add('incorrect');});
        if(b.dataset.a===correctRef)quizScore++;
        quizRound++;
        document.getElementById('sc').textContent=quizScore;
        document.getElementById('pqFb').innerHTML='<p class="result-hint">'+(b.dataset.a===correctRef?'✓ Richtig!':'✗ '+target.name+' liegt in <b>'+correctRef+'</b>')+'</p><button class="btn" id="pqNx">Weiter →</button>';
        document.getElementById('pqNx').onclick=renderPlanquadrat;
      };
    });
  } else if(qType===1){
    // Type B: "Was liegt (auch) in Planquadrat X?" — pick a cell with landmarks
    const cellsWithLm=city.cells.filter(c=>c.landmarks.length>0);
    const cell=cellsWithLm[Math.floor(rng()*cellsWithLm.length)];
    const ref=city.letters[cell.row]+(cell.col+1);
    const target=cell.landmarks[Math.floor(rng()*cell.landmarks.length)];
    const correctName=target.name;
    // Distractors: things NOT in this cell
    const inCell=cell.landmarks.map(l=>l.name);
    const notInCell=city.placed.filter(l=>!inCell.includes(l.name)).map(l=>l.name);
    const extraNames=LANDMARKS_POOL.filter(l=>!inCell.includes(l.name)&&!notInCell.includes(l.name)).map(l=>l.name);
    const wrongPool=[...new Set([...notInCell,...extraNames])].filter(n=>n!==correctName);
    shuffle(wrongPool);
    const opts=shuffle([correctName,...wrongPool.slice(0,3)]);
    html+='<div class="quiz-q">Was liegt in Planquadrat <b>'+ref+'</b>?</div>';
    html+='<canvas id="cPQ"></canvas>';
    opts.forEach(o=>{html+='<button class="fopt" data-a="'+o+'">'+o+'</button>';});
    html+='<div id="pqFb"></div></div>';
    html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
    contentEl.innerHTML=html;
    drawPlanquadratMap(document.getElementById('cPQ'),city,{row:cell.row,col:cell.col});

    contentEl.querySelectorAll('.fopt').forEach(b=>{
      b.onclick=()=>{
        contentEl.querySelectorAll('.fopt').forEach(x=>{x.disabled=true;if(x.dataset.a===correctName)x.classList.add('correct');else if(x===b&&b.dataset.a!==correctName)x.classList.add('incorrect');});
        if(b.dataset.a===correctName)quizScore++;
        quizRound++;
        document.getElementById('sc').textContent=quizScore;
        document.getElementById('pqFb').innerHTML='<p class="result-hint">'+(b.dataset.a===correctName?'✓ Richtig!':'✗ In '+ref+' liegt <b>'+correctName+'</b>')+'</p><button class="btn" id="pqNx">Weiter →</button>';
        document.getElementById('pqNx').onclick=renderPlanquadrat;
      };
    });
  } else {
    // Type C: "Was liegt NICHT in Planquadrat X?" — tricky when cell has multiple things
    const cellsWithMultiple=city.cells.filter(c=>c.landmarks.length>=2);
    const cell=cellsWithMultiple.length>0?cellsWithMultiple[Math.floor(rng()*cellsWithMultiple.length)]:city.cells.filter(c=>c.landmarks.length>0)[0];
    const ref=city.letters[cell.row]+(cell.col+1);
    const inCell=cell.landmarks.map(l=>l.name);
    // Correct answer: something NOT in this cell
    const notInCell=city.placed.filter(l=>!inCell.includes(l.name)).map(l=>l.name);
    const correctName=notInCell.length>0?notInCell[Math.floor(rng()*notInCell.length)]:LANDMARKS_POOL[0].name;
    // Distractors: things that ARE in this cell
    const wrongPool=[...inCell];
    // Add extra from other cells if needed
    while(wrongPool.length<3){
      const extra=LANDMARKS_POOL[Math.floor(rng()*LANDMARKS_POOL.length)].name;
      if(!wrongPool.includes(extra)&&extra!==correctName)wrongPool.push(extra);
    }
    shuffle(wrongPool);
    const opts=shuffle([correctName,...wrongPool.slice(0,3)]);
    html+='<div class="quiz-q">Was liegt <b>NICHT</b> in Planquadrat <b>'+ref+'</b>?</div>';
    html+='<canvas id="cPQ"></canvas>';
    opts.forEach(o=>{html+='<button class="fopt" data-a="'+o+'">'+o+'</button>';});
    html+='<div id="pqFb"></div></div>';
    html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
    contentEl.innerHTML=html;
    drawPlanquadratMap(document.getElementById('cPQ'),city,{row:cell.row,col:cell.col});

    contentEl.querySelectorAll('.fopt').forEach(b=>{
      b.onclick=()=>{
        contentEl.querySelectorAll('.fopt').forEach(x=>{x.disabled=true;if(x.dataset.a===correctName)x.classList.add('correct');else if(x===b&&b.dataset.a!==correctName)x.classList.add('incorrect');});
        if(b.dataset.a===correctName)quizScore++;
        quizRound++;
        document.getElementById('sc').textContent=quizScore;
        document.getElementById('pqFb').innerHTML='<p class="result-hint">'+(b.dataset.a===correctName?'✓ Richtig!':'✗ <b>'+correctName+'</b> liegt nicht in '+ref)+'</p><button class="btn" id="pqNx">Weiter →</button>';
        document.getElementById('pqNx').onclick=renderPlanquadrat;
      };
    });
  }
}

function getNodeNeighbors(mapData,nodeIdx){
  const nb=[];
  mapData.edges.forEach(e=>{
    if(e[0]===nodeIdx)nb.push({to:e[1],street:e[2]});
    if(e[1]===nodeIdx)nb.push({to:e[0],street:e[2]});
  });
  return nb;
}

function getEdgeStreet(mapData,fromIdx,toIdx){
  for(const e of mapData.edges){
    if((e[0]===fromIdx&&e[1]===toIdx)||(e[1]===fromIdx&&e[0]===toIdx))return e[2];
  }
  return 'Straße';
}

function getTurnDirection(mapData,prevIdx,curIdx,nextIdx){
  const pn=mapData.nodes[prevIdx],cn=mapData.nodes[curIdx],nn=mapData.nodes[nextIdx];
  // Vector from prev to cur
  const ax=cn.x-pn.x,ay=cn.y-pn.y;
  // Vector from cur to next
  const bx=nn.x-cn.x,by=nn.y-cn.y;
  // Cross product: positive = right turn, negative = left turn
  const cross=ax*by-ay*bx;
  // Dot product for straight detection
  const dot=ax*bx+ay*by;
  const magA=Math.sqrt(ax*ax+ay*ay),magB=Math.sqrt(bx*bx+by*by);
  const cosAngle=dot/(magA*magB+0.001);
  if(cosAngle>0.85)return 'geradeaus';
  return cross>0?'rechts abbiegen':'links abbiegen';
}

function buildGraphRouteDesc(route,mapData){
  const parts=[];
  for(let i=0;i<route.length-1;i++){
    const street=getEdgeStreet(mapData,route[i],route[i+1]);
    if(i===0){
      parts.push('Gehe die '+street+' entlang');
    } else {
      const dir=getTurnDirection(mapData,route[i-1],route[i],route[i+1]);
      if(dir==='geradeaus') parts.push('weiter geradeaus auf der '+street);
      else parts.push(dir+' in die '+street);
    }
    // Landmark at destination (unless it's the final point)
    const destNode=mapData.nodes[route[i+1]];
    if(destNode.lm&&i<route.length-2){
      parts[parts.length-1]+=' (vorbei am '+destNode.lm+')';
    }
  }
  return parts.join(', dann ')+'.';
}

function corruptGraphDesc(route,mapData){
  const parts=[];
  const corruptIdx=1+Math.floor(rng()*Math.max(1,route.length-2));
  const allStreets=[...new Set(mapData.edges.map(e=>e[2]))];
  for(let i=0;i<route.length-1;i++){
    const street=getEdgeStreet(mapData,route[i],route[i+1]);
    if(i===0){
      if(i===corruptIdx){
        const wrong=allStreets.filter(s=>s!==street);
        parts.push('Gehe die '+(wrong[Math.floor(rng()*wrong.length)]||street)+' entlang');
      } else {
        parts.push('Gehe die '+street+' entlang');
      }
    } else {
      const dir=getTurnDirection(mapData,route[i-1],route[i],route[i+1]);
      if(i===corruptIdx){
        if(rng()<0.5){
          const wrongDir=dir==='links abbiegen'?'rechts abbiegen':(dir==='rechts abbiegen'?'links abbiegen':'rechts abbiegen');
          parts.push(wrongDir+' in die '+street);
        } else {
          const wrong=allStreets.filter(s=>s!==street);
          parts.push((dir==='geradeaus'?'weiter geradeaus auf der ':dir+' in die ')+(wrong[Math.floor(rng()*wrong.length)]||street));
        }
      } else {
        if(dir==='geradeaus') parts.push('weiter geradeaus auf der '+street);
        else parts.push(dir+' in die '+street);
      }
    }
  }
  return parts.join(', dann ')+'.';
}

function findGraphRoute(mapData,startIdx,endIdx){
  const q=[{node:startIdx,path:[startIdx]}];
  const visited=new Set([startIdx]);
  while(q.length>0){
    const cur=q.shift();
    if(cur.node===endIdx)return cur.path;
    const nb=getNodeNeighbors(mapData,cur.node);
    nb.forEach(n=>{
      if(!visited.has(n.to)){
        visited.add(n.to);
        q.push({node:n.to,path:[...cur.path,n.to]});
      }
    });
  }
  return null;
}

function pickRouteEndpoints(mapData){
  const minLen=advanced?4:3,maxLen=advanced?8:6;
  let best=null,bestLen=0,attempts=0;
  while(attempts<40){
    attempts++;
    const a=Math.floor(rng()*mapData.nodes.length);
    const b=Math.floor(rng()*mapData.nodes.length);
    if(a===b)continue;
    const route=findGraphRoute(mapData,a,b);
    if(route&&route.length>=minLen&&route.length<=maxLen){
      if(route.length>bestLen){bestLen=route.length;best=route;}
    }
  }
  return best;
}

function drawGraphStreetMap(canvas,mapData,route,showRoute){
  const W=300,H=300;canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const pad=18;
  const iw=W-pad*2,ih=H-pad*2;
  function nx(x){return pad+x*iw;}
  function ny(y){return pad+y*ih;}

  // Background
  ctx.fillStyle='#f0ede5';ctx.fillRect(0,0,W,H);

  // Draw building blocks (fill between streets with color)
  // Simple approach: fill triangulated areas between edges with building color
  ctx.fillStyle='#e8d0b8';
  ctx.fillRect(pad,pad,iw,ih);

  // Draw edges (streets) as thick lines
  ctx.lineCap='round';
  mapData.edges.forEach(e=>{
    const a=mapData.nodes[e[0]],b=mapData.nodes[e[1]];
    ctx.strokeStyle='#fff';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(nx(a.x),ny(a.y));ctx.lineTo(nx(b.x),ny(b.y));ctx.stroke();
  });
  // Street center lines
  mapData.edges.forEach(e=>{
    const a=mapData.nodes[e[0]],b=mapData.nodes[e[1]];
    ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(nx(a.x),ny(a.y));ctx.lineTo(nx(b.x),ny(b.y));ctx.stroke();
    ctx.setLineDash([]);
  });

  // Street name labels along edges
  ctx.font='7px -apple-system,sans-serif';ctx.fillStyle='#777';ctx.textAlign='center';ctx.textBaseline='bottom';
  const labeledStreets=new Set();
  mapData.edges.forEach(e=>{
    if(labeledStreets.has(e[2]))return;
    labeledStreets.add(e[2]);
    const a=mapData.nodes[e[0]],b=mapData.nodes[e[1]];
    const mx=(nx(a.x)+nx(b.x))/2,my=(ny(a.y)+ny(b.y))/2;
    const angle=Math.atan2(ny(b.y)-ny(a.y),nx(b.x)-nx(a.x));
    ctx.save();ctx.translate(mx,my);
    let rot=angle;
    if(rot>Math.PI/2)rot-=Math.PI;
    if(rot<-Math.PI/2)rot+=Math.PI;
    ctx.rotate(rot);
    ctx.fillText(e[2],0,-4);
    ctx.restore();
  });

  // Draw intersections
  mapData.nodes.forEach((n,i)=>{
    const x=nx(n.x),y=ny(n.y);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#bbb';ctx.fill();
  });

  // Draw landmarks
  ctx.font='bold 9px -apple-system,sans-serif';
  mapData.nodes.forEach(n=>{
    if(!n.lm)return;
    const x=nx(n.x),y=ny(n.y);
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='var(--amber)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#333';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n.lm.slice(0,2),x,y);
  });

  // Draw route
  if(showRoute&&route&&route.length>1){
    ctx.setLineDash([6,4]);ctx.strokeStyle='#c2762d';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();
    route.forEach((ni,i)=>{
      const n=mapData.nodes[ni];
      i===0?ctx.moveTo(nx(n.x),ny(n.y)):ctx.lineTo(nx(n.x),ny(n.y));
    });
    ctx.stroke();ctx.setLineDash([]);
    // A and B
    const A=mapData.nodes[route[0]],B=mapData.nodes[route[route.length-1]];
    ctx.font='bold 13px Georgia,serif';ctx.fillStyle='#c2762d';ctx.textAlign='center';
    ctx.fillText('A',nx(A.x),ny(A.y)-13);
    ctx.fillText('B',nx(B.x),ny(B.y)-13);
    ctx.fillStyle='#c2762d';
    ctx.beginPath();ctx.arc(nx(A.x),ny(A.y),5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(nx(B.x),ny(B.y),5,0,Math.PI*2);ctx.fill();
  }
}

function renderWeg(){
  if(quizRound>=MAX_ROUNDS){renderDone(()=>{resetQuiz();renderWeg();});return;}

  const mapData=WEGE_MAPS[Math.floor(rng()*WEGE_MAPS.length)];
  const route=pickRouteEndpoints(mapData);
  if(!route){quizRound++;renderWeg();return;}

  if(advanced){
    renderWegAdvanced(mapData,route);
  } else {
    renderWegNormal(mapData,route);
  }
}

function renderWegNormal(mapData,route){
  const correctDesc=buildGraphRouteDesc(route,mapData);
  const wrongDesc=corruptGraphDesc(route,mapData);
  const opts=rng()<0.5?[{text:correctDesc,correct:true},{text:wrongDesc,correct:false}]:[{text:wrongDesc,correct:false},{text:correctDesc,correct:true}];

  let html='<div class="quiz-card"><div class="card-title">Frage '+(quizRound+1)+' / '+MAX_ROUNDS+'</div>';
  html+='<div class="quiz-q">Welche Wegbeschreibung passt zum eingezeichneten Weg?</div>';
  html+='<canvas id="cWeg"></canvas>';
  html+='<div style="margin-top:10px;">';
  opts.forEach((o,i)=>{html+='<button class="route-opt" data-i="'+i+'">'+o.text+'</button>';});
  html+='</div><div id="wFb"></div></div>';
  html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
  contentEl.innerHTML=html;

  drawGraphStreetMap(document.getElementById('cWeg'),mapData,route,true);

  contentEl.querySelectorAll('.route-opt').forEach(b=>{
    b.onclick=()=>{
      const picked=parseInt(b.dataset.i);
      const isCorrect=opts[picked].correct;
      contentEl.querySelectorAll('.route-opt').forEach((x,xi)=>{
        x.disabled=true;
        if(opts[xi].correct)x.classList.add('correct');
        else if(x===b&&!isCorrect)x.classList.add('incorrect');
      });
      if(isCorrect)quizScore++;
      quizRound++;
      document.getElementById('sc').textContent=quizScore;
      document.getElementById('wFb').innerHTML='<p class="result-hint">'+(isCorrect?'✓ Richtig!':'✗ Die andere Beschreibung war korrekt.')+'</p><button class="btn" id="wNx">Weiter →</button>';
      document.getElementById('wNx').onclick=renderWeg;
    };
  });
}

function renderWegAdvanced(mapData,route){
  // Advanced: show route on map, then two-step MC at each decision point
  // Step 1: direction (links/rechts/geradeaus)
  // Step 2: how far (bis zur Kreuzung / bis zum Park / die Straße entlang bis...)
  let html='<div class="quiz-card"><div class="card-title">Frage '+(quizRound+1)+' / '+MAX_ROUNDS+'</div>';
  html+='<div class="quiz-q">Beschreibe den eingezeichneten Weg Schritt für Schritt!</div>';
  html+='<canvas id="cWegA"></canvas>';
  html+='<p id="wegHint" style="font-size:12px;color:var(--ink-soft);text-align:center;margin:6px 0;"></p>';
  html+='<div id="wegSteps"></div></div>';
  html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
  contentEl.innerHTML=html;

  const canvas=document.getElementById('cWegA');
  const W=300,H=300;canvas.width=W;canvas.height=H;
  const pad=18,iw=W-pad*2,ih=H-pad*2;
  function nx(x){return pad+x*iw;}
  function ny(y){return pad+y*ih;}

  // Draw the map with route shown
  drawGraphStreetMap(canvas,mapData,route,true);

  const allStreets=[...new Set(mapData.edges.map(e=>e[2]))];
  const stepsDiv=document.getElementById('wegSteps');
  let stepIdx=1,stepScore=0,totalSteps=0;

  // Build decision points: each step in the route is a decision
  // except consecutive edges on same street that can be merged into "folge der Straße bis..."
  const decisions=[];
  for(let i=0;i<route.length-1;i++){
    const fromIdx=route[i],toIdx=route[i+1];
    const street=getEdgeStreet(mapData,fromIdx,toIdx);
    const destNode=mapData.nodes[toIdx];
    const isLastEdge=(i===route.length-2);

    // Determine if next edge continues on same street (merge into "follow until")
    let continuesOnSame=false;
    if(!isLastEdge){
      const nextStreet=getEdgeStreet(mapData,route[i+1],route[i+2]);
      if(nextStreet===street)continuesOnSame=true;
    }

    if(i===0){
      // First step: always a decision point
      decisions.push({fromIdx,toIdx,street,type:'start',mergeUntil:null});
    } else {
      const prevIdx=route[i-1];
      const dir=getTurnDirection(mapData,prevIdx,fromIdx,toIdx);
      // Check if this is a turn (new decision) or continuation
      const prevStreet=getEdgeStreet(mapData,route[i-1],route[i]);
      if(street!==prevStreet||dir!=='geradeaus'){
        // New direction = decision point
        // Figure out what's at the destination for the "how far" question
        let target=null;
        if(destNode.lm) target=destNode.lm;
        else if(isLastEdge) target='Ziel B';
        else{
          const nb=getNodeNeighbors(mapData,toIdx);
          target=nb.length>=3?'nächste Kreuzung':'Ende der Straße';
        }
        decisions.push({fromIdx,toIdx,street,type:'turn',dir,target,prevIdx});
      }
      // If not a new decision, it's part of a "follow street" merged section
    }
  }
  totalSteps=decisions.length;
  document.getElementById('wegHint').innerHTML='Beschreibe <b>'+totalSteps+' Schritte</b> des Weges:';

  function showDecision(){
    if(stepIdx>decisions.length){
      const pct=Math.round(stepScore/totalSteps*100);
      stepsDiv.innerHTML='<p class="result-hint" style="margin-top:10px;"><b>'+stepScore+'/'+totalSteps+' richtig!</b></p><button class="btn" id="waNx">Weiter →</button>';
      if(pct>=50)quizScore++;
      quizRound++;
      document.getElementById('sc').textContent=quizScore;
      document.getElementById('waNx').onclick=renderWeg;
      return;
    }
    const d=decisions[stepIdx-1];

    // Highlight current position on map
    drawGraphStreetMap(canvas,mapData,route,true);
    const ctx3=canvas.getContext('2d');
    const fn=mapData.nodes[d.fromIdx];
    ctx3.strokeStyle='#c2762d';ctx3.lineWidth=3;
    ctx3.beginPath();ctx3.arc(nx(fn.x),ny(fn.y),12,0,Math.PI*2);ctx3.stroke();

    if(d.type==='start'){
      showStartStep(d);
    } else {
      showTurnStep(d);
    }
  }

  function showStartStep(d){
    // Step 1 only: which street to start on
    const correctOpt='Gehe die '+d.street+' entlang';
    const otherStreets=allStreets.filter(s=>s!==d.street);
    shuffle(otherStreets);
    const wrongOpts=[
      'Gehe die '+(otherStreets[0]||'Weg')+' entlang',
      'Gehe die '+(otherStreets[1]||otherStreets[0]||'Pfad')+' entlang'
    ];
    const opts=shuffle([correctOpt,...wrongOpts]);

    let h='<div style="margin-top:8px;"><p style="font-size:12px;font-weight:600;margin:0 0 6px;">Schritt '+stepIdx+'/'+totalSteps+': Von A aus — wohin?</p>';
    h+='<div style="display:flex;flex-direction:column;gap:6px;">';
    opts.forEach(o=>{h+='<button class="cross-btn" data-a="'+o+'">'+o+'</button>';});
    h+='</div></div>';
    stepsDiv.innerHTML=h;

    stepsDiv.querySelectorAll('.cross-btn').forEach(b=>{
      b.onclick=()=>{
        stepsDiv.querySelectorAll('.cross-btn').forEach(x=>{
          x.disabled=true;
          if(x.dataset.a===correctOpt)x.classList.add('correct');
          else if(x===b&&b.dataset.a!==correctOpt)x.classList.add('incorrect');
        });
        if(b.dataset.a===correctOpt)stepScore++;
        stepIdx++;
        setTimeout(showDecision,900);
      };
    });
  }

  function showTurnStep(d){
    // Two-phase: first direction, then "how far"
    const dirCorrect=d.dir==='geradeaus'?'Geradeaus':d.dir.charAt(0).toUpperCase()+d.dir.slice(1);
    const dirOpts=shuffle(['Links abbiegen','Rechts abbiegen','Geradeaus'].filter(x=>x!==dirCorrect).slice(0,2).concat([dirCorrect]));

    let h='<div style="margin-top:8px;"><p style="font-size:12px;font-weight:600;margin:0 0 6px;">Schritt '+stepIdx+'/'+totalSteps+': Welche Richtung?</p>';
    h+='<div style="display:flex;gap:6px;">';
    dirOpts.forEach(o=>{h+='<button class="cross-btn" data-a="'+o+'" style="flex:1;">'+o+'</button>';});
    h+='</div></div>';
    stepsDiv.innerHTML=h;

    stepsDiv.querySelectorAll('.cross-btn').forEach(b=>{
      b.onclick=()=>{
        const dirOk=(b.dataset.a===dirCorrect);
        stepsDiv.querySelectorAll('.cross-btn').forEach(x=>{
          x.disabled=true;
          if(x.dataset.a===dirCorrect)x.classList.add('correct');
          else if(x===b&&!dirOk)x.classList.add('incorrect');
        });
        if(dirOk)stepScore+=0.5;
        // Phase 2: which street / how far
        setTimeout(()=>showHowFar(d),700);
      };
    });
  }

  function showHowFar(d){
    const correctStreet='In die '+d.street;
    const destNode=mapData.nodes[d.toIdx];
    let howFar='bis zur nächsten Kreuzung';
    if(destNode.lm) howFar='bis zum '+destNode.lm;
    else if(d.toIdx===route[route.length-1]) howFar='bis zum Ziel';
    else{
      const nb=getNodeNeighbors(mapData,d.toIdx);
      howFar=nb.length>=3?'bis zur nächsten Kreuzung':'bis zum Ende der Straße';
    }
    const correctOpt=correctStreet+', '+howFar;

    // Wrong options: wrong street or wrong destination
    const otherStreets=allStreets.filter(s=>s!==d.street);
    shuffle(otherStreets);
    const wrongTargets=['bis zum Park','bis zur Ampel','bis zur nächsten Kreuzung','bis zum Brunnen','bis zur Kirche'].filter(t=>t!==howFar);
    shuffle(wrongTargets);
    const wrongOpts=[
      'In die '+(otherStreets[0]||'Straße')+', '+(wrongTargets[0]||howFar),
      correctStreet+', '+(wrongTargets[1]||wrongTargets[0]||'bis zum Ende'),
    ];

    const opts=shuffle([correctOpt,...wrongOpts]);
    let h='<div style="margin-top:8px;"><p style="font-size:12px;font-weight:600;margin:0 0 6px;">Wohin und wie weit?</p>';
    h+='<div style="display:flex;flex-direction:column;gap:6px;">';
    opts.forEach(o=>{h+='<button class="cross-btn" data-a="'+o+'">'+o+'</button>';});
    h+='</div></div>';
    stepsDiv.innerHTML=h;

    stepsDiv.querySelectorAll('.cross-btn').forEach(b=>{
      b.onclick=()=>{
        const ok=(b.dataset.a===correctOpt);
        stepsDiv.querySelectorAll('.cross-btn').forEach(x=>{
          x.disabled=true;
          if(x.dataset.a===correctOpt)x.classList.add('correct');
          else if(x===b&&!ok)x.classList.add('incorrect');
        });
        if(ok)stepScore+=0.5;
        stepIdx++;
        setTimeout(showDecision,900);
      };
    });
  }

  showDecision();
}

/* ━━━━━━ LUFTBILD QUIZ ━━━━━━ */
function drawSatelliteView(canvas,cells,size,highlightIdx){
  const W=300,H=300;canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const pad=8;
  const cw=(W-pad*2)/size,ch=(H-pad*2)/size;

  ctx.fillStyle='#4a5a40';ctx.fillRect(0,0,W,H);

  // Draw each cell with naturalistic textures
  cells.forEach((cell,idx)=>{
    const x=pad+cell.col*cw,y=pad+cell.row*ch;

    if(cell.colorId==='gruen'){
      // Trees: varied green circles
      ctx.fillStyle='#5a8a3a';ctx.fillRect(x+2,y+2,cw-4,ch-4);
      for(let t=0;t<12;t++){
        const tx=x+5+((t*19+7)%(cw-10));
        const ty=y+5+((t*13+3)%(ch-10));
        const r=3+((t*7)%4);
        ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);
        ctx.fillStyle='hsl('+(100+t*5)+',50%,'+(30+t*3)+'%)';ctx.fill();
      }
    } else if(cell.colorId==='rosa'||cell.colorId==='rot'){
      // Buildings: gray/brown rectangles
      ctx.fillStyle='#8a8070';ctx.fillRect(x+2,y+2,cw-4,ch-4);
      const bColor=cell.colorId==='rot'?'#7a6860':'#9a8a7a';
      ctx.fillStyle=bColor;
      ctx.fillRect(x+5,y+5,cw*0.6,ch*0.4);
      ctx.fillRect(x+cw*0.3,y+ch*0.5,cw*0.5,ch*0.35);
      // Shadow
      ctx.fillStyle='rgba(0,0,0,.15)';
      ctx.fillRect(x+5+2,y+5+2,cw*0.6,ch*0.4);
    } else if(cell.colorId==='blau'){
      // Water: blue with ripples
      ctx.fillStyle='#4a8ab0';ctx.fillRect(x+2,y+2,cw-4,ch-4);
      ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;
      for(let w=0;w<4;w++){
        ctx.beginPath();
        ctx.moveTo(x+4,y+8+w*10);
        ctx.quadraticCurveTo(x+cw/2,y+5+w*10,x+cw-4,y+8+w*10);
        ctx.stroke();
      }
    } else if(cell.colorId==='dgruen'){
      // Shops: darker structures
      ctx.fillStyle='#6a7060';ctx.fillRect(x+2,y+2,cw-4,ch-4);
      ctx.fillStyle='#5a6050';
      ctx.fillRect(x+4,y+4,cw-8,ch*0.6);
    } else {
      // Streets/squares: dark gray
      ctx.fillStyle='#6a6a6a';ctx.fillRect(x+2,y+2,cw-4,ch-4);
      ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+cw/2,y+4);ctx.lineTo(x+cw/2,y+ch-4);ctx.stroke();
    }
  });

  // Street gaps (dark lines between cells)
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=2;
  for(let r=1;r<size;r++){
    ctx.beginPath();ctx.moveTo(pad,pad+r*ch);ctx.lineTo(W-pad,pad+r*ch);ctx.stroke();
  }
  for(let c=1;c<size;c++){
    ctx.beginPath();ctx.moveTo(pad+c*cw,pad);ctx.lineTo(pad+c*cw,H-pad);ctx.stroke();
  }

  // Highlight
  if(highlightIdx!=null){
    const cell=cells[highlightIdx];
    const x=pad+cell.col*cw,y=pad+cell.row*ch;
    ctx.strokeStyle='#c2762d';ctx.lineWidth=3;ctx.setLineDash([6,4]);
    ctx.strokeRect(x+1,y+1,cw-2,ch-2);ctx.setLineDash([]);
  }
}

function renderLuftbild(){
  if(quizRound>=MAX_ROUNDS){renderDone(()=>{resetQuiz();renderLuftbild();});return;}

  const size=advanced?5:4;
  const colorIds=['gruen','rot','rosa','grau','blau','dgruen'];
  const cells=[];
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    cells.push({row:r,col:c,colorId:colorIds[Math.floor(rng()*colorIds.length)]});
  }
  // Pick a highlight cell
  const hlIdx=Math.floor(rng()*cells.length);
  const correctColor=MAP_COLORS.find(mc=>mc.id===cells[hlIdx].colorId);

  let html='<div class="quiz-card"><div class="card-title">Frage '+(quizRound+1)+' / '+MAX_ROUNDS+'</div>';
  html+='<div class="quiz-q">Welche <b>Kartenfarbe</b> passt zum markierten Bereich im Luftbild?</div>';
  html+='<canvas id="cLB"></canvas>';
  // Options
  const wrong=MAP_COLORS.filter(c=>c.id!==correctColor.id);
  shuffle(wrong);
  const opts=shuffle([correctColor,...wrong.slice(0,3)]);
  opts.forEach(o=>{
    html+='<button class="fopt" data-a="'+o.id+'"><span style="display:inline-block;width:16px;height:16px;border-radius:4px;background:'+o.color+';vertical-align:middle;margin-right:8px;border:1px solid rgba(0,0,0,.1);"></span>'+o.label+' — '+o.name+'</button>';
  });
  html+='<div id="lbFb"></div></div>';
  html+='<div class="scorebar"><div class="stat"><b id="sc">'+quizScore+'</b><small>Richtig</small></div><div class="stat"><b>'+quizRound+'</b><small>von '+MAX_ROUNDS+'</small></div></div>';
  contentEl.innerHTML=html;

  drawSatelliteView(document.getElementById('cLB'),cells,size,hlIdx);

  contentEl.querySelectorAll('.fopt').forEach(b=>{
    b.onclick=()=>{
      contentEl.querySelectorAll('.fopt').forEach(x=>{x.disabled=true;if(x.dataset.a===correctColor.id)x.classList.add('correct');else if(x===b&&b.dataset.a!==correctColor.id)x.classList.add('incorrect');});
      if(b.dataset.a===correctColor.id)quizScore++;
      quizRound++;
      document.getElementById('sc').textContent=quizScore;
      document.getElementById('lbFb').innerHTML='<p class="result-hint">'+(b.dataset.a===correctColor.id?'✓ Richtig!':'✗ Richtig wäre: <b>'+correctColor.label+' — '+correctColor.name+'</b>')+'</p><button class="btn" id="lbNx">Weiter →</button>';
      document.getElementById('lbNx').onclick=renderLuftbild;
    };
  });
}

/* ━━━━━━ DONE ━━━━━━ */
function renderDone(restartFn){
  const pct=Math.round(quizScore/MAX_ROUNDS*100);
  contentEl.innerHTML='<div class="quiz-card"><div class="done-box"><div class="done-e">'+(pct>=80?'🏆':pct>=50?'👏':'📚')+'</div><div class="done-s">'+quizScore+' / '+MAX_ROUNDS+' richtig</div><div class="done-sub">'+pct+'%</div><button class="btn" id="re">Nochmal</button></div></div>';
  document.getElementById('re').onclick=restartFn;
}
